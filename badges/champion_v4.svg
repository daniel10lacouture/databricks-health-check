<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="320" height="400">
  <defs>
    <linearGradient id="champ_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D2D4A"/>
      <stop offset="100%" stop-color="#0F1B2D"/>
    </linearGradient>
    <linearGradient id="champ_gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#F0C420"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <linearGradient id="ribbon_l" x1="0" y1="0" x2="1" y2="0">
