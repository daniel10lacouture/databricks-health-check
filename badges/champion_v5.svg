<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 220" width="360" height="440">
  <defs>
    <linearGradient id="ch_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0F1B2D"/>
    </linearGradient>
    <linearGradient id="ch_ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D94F4F"/>
      <stop offset="50%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#D94F4F"/>
    </linearGradient>
  </defs>

  <!-- Hexagonal crest body -->
  <polygon points="90,6 160,40 160,130 90,175 20,130 20,40" fill="url(#ch_bg)"/>
  <polygon points="90,12 155,43 155,127 90,169 25,127 25,43" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.15"/>
  <polygon points="90,18 150,46 150,124 90,163 30,124 30,46" fill="none" stroke="#FFD700" stroke-width="0.3" opacity="0.08"/>

  <!-- Top star arc (5 gold stars) -->
  <polygon points="54.0,31.0 55.2,34.4 58.8,34.5 55.9,36.6 56.9,40.0 54.0,38.0 51.1,40.0 52.1,36.6 49.2,34.5 52.8,34.4" fill="#FFD700"/>
  <polygon points="68.0,24.0 69.4,28.1 73.7,28.1 70.3,30.7 71.5,34.9 68.0,32.4 64.5,34.9 65.7,30.7 62.3,28.1 66.6,28.1" fill="#FFD700"/>
  <polygon points="90.0,20.0 91.6,24.7 96.7,24.8 92.7,27.9 94.1,32.7 90.0,29.8 85.9,32.7 87.3,27.9 83.3,24.8 88.4,24.7" fill="#FFD700"/>
  <polygon points="112.0,24.0 113.4,28.1 117.7,28.1 114.3,30.7 115.5,34.9 112.0,32.4 108.5,34.9 109.7,30.7 106.3,28.1 110.6,28.1" fill="#FFD700"/>
  <polygon points="126.0,31.0 127.2,34.4 130.8,34.5 127.9,36.6 128.9,40.0 126.0,38.0 123.1,40.0 124.1,36.6 121.2,34.5 124.8,34.4" fill="#FFD700"/>

  <!-- CHAMPION text above ribbon -->
  <text x="90" y="58" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="8" font-weight="700" fill="#6B7B90" letter-spacing="4">OVERALL</text>

  <!-- Trophy icon -->
  <g transform="translate(90,85)">
    <!-- Cup body -->
    <path d="M-16,-20 L16,-20 L16,-6 C16,10 0,22 0,22 C0,22 -16,10 -16,-6Z" fill="none" stroke="#FFD700" stroke-width="2.2"/>
    <!-- Handles -->
    <path d="M-16,-16 L-24,-16 C-24,-16 -24,-4 -16,-4" fill="none" stroke="#DAA520" stroke-width="1.8" opacity="0.45"/>
    <path d="M16,-16 L24,-16 C24,-16 24,-4 16,-4" fill="none" stroke="#DAA520" stroke-width="1.8" opacity="0.45"/>
    <!-- Base -->
    <rect x="-5" y="20" width="10" height="4" rx="1.5" fill="#DAA520" opacity="0.5"/>
    <rect x="-12" y="24" width="24" height="3.5" rx="1.5" fill="#DAA520" opacity="0.4"/>
    <!-- Star on cup -->
    <polygon points="0.0,-11.0 1.6,-6.3 6.7,-6.2 2.7,-3.1 4.1,1.7 0.0,-1.2 -4.1,1.7 -2.7,-3.1 -6.7,-6.2 -1.6,-6.3" fill="#FFD700"/>
  </g>

  <!-- Ribbon banner -->
  <path d="M8,120 L24,114 L156,114 L172,120 L172,138 L160,132 L156,138 L24,138 L20,132 L8,138Z" fill="url(#ch_ribbon)"/>
  <path d="M8,120 L24,114 L156,114 L172,120 L172,124 L156,118 L24,118 L8,124Z" fill="white" opacity="0.1"/>
  <text x="90" y="131" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="800" fill="white" letter-spacing="4">CHAMPION</text>

  <!-- Bottom decorative waves -->
  <path d="M50,150 Q90,158 130,150" fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.2"/>
  <path d="M56,154 Q90,160 124,154" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.12"/>

  <!-- Bottom text -->
  <text x="90" y="168" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="7" font-weight="600" fill="#6B7B90" letter-spacing="3" opacity="0.6">HEALTH CHECK</text>

  <!-- Point accent -->
  <circle cx="90" cy="172" r="1.5" fill="#FFD700" opacity="0.15"/>
</svg>