    <path d="M-12,-10 L12,-10 L12,0 C12,10 0,18 0,18 C0,18 -12,10 -12,0Z" fill="none" stroke="#FFD700" stroke-width="1.8"/>
    <path d="M-12,-7 L-18,-7 C-18,-7 -18,0 -12,0" fill="none" stroke="#DAA520" stroke-width="1.2" opacity="0.4"/>
