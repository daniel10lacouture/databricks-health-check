<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="400" height="500">
  <defs>
    <linearGradient id="ch6_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2D45"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="ch6_rib" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CC2B1A"/>
      <stop offset="40%" stop-color="#FF3621"/>
      <stop offset="60%" stop-color="#FF3621"/>
      <stop offset="100%" stop-color="#CC2B1A"/>
    </linearGradient>
  </defs>

  <!-- Outer coral border hex -->
  <polygon points="100,4 178,44 178,156 100,200 22,156 22,44" fill="#FF3621" opacity="0.15"/>
  <!-- White border hex -->
  <polygon points="100,10 172,47 172,153 100,194 28,153 28,47" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
  <!-- Main navy hex -->
  <polygon points="100,14 168,49 168,151 100,190 32,151 32,49" fill="url(#ch6_bg)"/>
  <!-- Inner trace -->
  <polygon points="100,22 162,53 162,147 100,182 38,147 38,53" fill="none" stroke="white" stroke-width="0.4" opacity="0.08"/>

  <!-- Top: Databricks-style icon (white) -->
