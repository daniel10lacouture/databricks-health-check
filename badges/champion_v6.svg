  <polygon points="74.0,86.0 75.3,90.2 79.7,90.1 76.2,92.7 77.5,96.9 74.0,94.3 70.5,96.9 71.8,92.7 68.3,90.1 72.7,90.2" fill="#FFD700"/>
  <polygon points="100.0,82.5 101.7,87.7 107.1,87.7 102.7,90.9 104.4,96.1 100.0,92.8 95.6,96.1 97.3,90.9 92.9,87.7 98.3,87.7" fill="#FFD700"/>
  <polygon points="126.0,86.0 127.3,90.2 131.7,90.1 128.2,92.7 129.5,96.9 126.0,94.3 122.5,96.9 123.8,92.7 120.3,90.1 124.7,90.2" fill="#FFD700"/>
  <polygon points="140.0,90.5 141.2,94.3 145.2,94.3 142.0,96.6 143.2,100.4 140.0,98.1 136.8,100.4 138.0,96.6 134.8,94.3 138.8,94.3" fill="#FFD700"/>

