  <!-- Stacked text -->
  <text x="100" y="82" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="800" fill="white" letter-spacing="2" opacity="0.6">HEALTH CHECK</text>

