<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" width="240" height="260">
  <defs>
    <linearGradient id="met_compute_cost_perfect" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="30%" stop-color="#A78BFA"/>
      <stop offset="60%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="rim_compute_cost_perfect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="40%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="face_compute_cost_perfect" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#9575F0"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <radialGradient id="gl_compute_cost_perfect" cx="45%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#DDD6FE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="bev_compute_cost_perfect">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="3" specularConstant="0.6" specularExponent="20" result="spec">
        <fePointLight x="60" y="20" z="80"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="0.3" k4="0"/>
    </filter>
    <filter id="sh_compute_cost_perfect"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3B0F80" flood-opacity="0.35"/></filter>
    <filter id="emb_compute_cost_perfect">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur"/>
      <feOffset dy="0.8" result="off"/>
      <feFlood flood-color="#DDD6FE" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="off" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
