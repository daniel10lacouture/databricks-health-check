function scoreColor(s){return s>=90?'#1B3139':s>=70?'#374151':s>=50?'#6B7280':'#9CA3AF'}
function scoreLabel(s){return s>=90?'Excellent':s>=70?'Good':s>=50?'Needs Attention':'Critical'}
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

function render(){
  const root=document.getElementById('root');
  const prevView=root.dataset.view||'';
  const newView=state.view;
  
  function doRender(){
  try{
    if(newView==='setup') root.innerHTML=renderSetup();
    else if(newView==='running') root.innerHTML=renderRunning();
    else if(newView==='dashboard'){
      root.innerHTML=renderApp(renderDashboard());
      // Score reveal animation
      if(prevView==='running'||!root.dataset.revealed){
        root.dataset.revealed='1';
        animateScoreReveal();
        saveToHistory();
      }
    }
    else if(newView==='wrapped') root.innerHTML=renderWrapped();
    else if(newView==='improvescore') root.innerHTML=renderApp(renderImproveScore());
    else if(newView==='costoverview') root.innerHTML=renderApp(renderCostOverview());
    else if(newView==='badges') root.innerHTML=renderApp(renderBadges());
    else if(newView==='section') root.innerHTML=renderApp(renderSection());
    root.dataset.view=newView;
    bindEvents();
  }catch(e){console.error('Render error:',e);root.innerHTML='<div style="padding:40px;text-align:center"><h2>Rendering Error</h2><p style="color:#6B7280">'+e.message+'</p><button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:#1B3139;color:white;border:none;border-radius:6px;cursor:pointer">Reload</button></div>';}
  }
  
  // Smooth fade transition between major views
  if(prevView&&prevView!==newView&&(prevView==='running'||newView==='running'||prevView==='setup')){
    root.classList.add('fading');
    setTimeout(()=>{doRender();root.classList.remove('fading')},200);
  } else {
    doRender();
  }
}

function animateScoreReveal(){
  const ov=state.results&&state.results.overall;
  if(!ov||!ov.overall_score)return;
  const target=Math.round(ov.overall_score);
  const els=document.querySelectorAll('svg text');
  let scoreEl=null;
  els.forEach(el=>{if(el.textContent==String(target)&&el.style.fontSize&&parseInt(el.style.fontSize)>20)scoreEl=el});
  if(!scoreEl)return;
  let current=0;
  const duration=1500;
  const start=Date.now();
  function tick(){
    const elapsed=Date.now()-start;
    const progress=Math.min(elapsed/duration,1);
    // Ease out cubic
    const eased=1-Math.pow(1-progress,3);
    current=Math.round(eased*target);
    scoreEl.textContent=current;
    if(progress<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  // Also reset ticker start time
  if(window._tickerState)window._tickerState.start=Date.now();
}

function saveToHistory(){
  try{
    const ov=state.results&&state.results.overall;
    if(!ov||!ov.overall_score)return;
    const history=JSON.parse(localStorage.getItem('hc_history')||'[]');
    history.push({
      score:Math.round(ov.overall_score),
      maturity:ov.maturity_label||'',
      timestamp:new Date().toISOString(),
      sections:(state.results.sections||[]).filter(s=>s.active).map(s=>({id:s.section_id,score:Math.round(s.score||0)}))
    });
    // Keep last 20 runs
    if(history.length>20)history.splice(0,history.length-20);
    localStorage.setItem('hc_history',JSON.stringify(history));
  }catch(e){}
}

function getHistoryBadge(){
  try{
    const history=JSON.parse(localStorage.getItem('hc_history')||'[]');
    if(history.length<2)return'';
    const prev=history[history.length-2];
    const curr=state.results&&state.results.overall;
    if(!curr||!curr.overall_score)return'';
    const diff=Math.round(curr.overall_score)-prev.score;
    if(diff===0)return'<span class="history-badge history-same">= same as last run</span>';
    const cls=diff>0?'history-up':'history-down';
    const arrow=diff>0?'\u2191':'\u2193';
    const ago=prev.timestamp?new Date(prev.timestamp).toLocaleDateString():'previous run';
    return'<span class="history-badge '+cls+'">'+arrow+' '+Math.abs(diff)+' pts vs '+ago+'</span>';
  }catch(e){return''}
}

}

function renderGaugeSVG(score,size,showLabel){
  const s=Math.max(0,Math.min(100,Math.round(score||0)));
  const sw=size>=120?6:size>=80?5:3;
  const r=(size/2)-sw-2;
  const circ=2*Math.PI*r;
  const arcLen=circ*0.75;
  const gapLen=circ*0.25;
  const filled=(s/100)*arcLen;
  const offset=arcLen-filled;
  const fs=size<55?13:size<80?18:size<110?24:34;
  const c='#FF3621';
  const numColor='#1B3139';
  const lbl=showLabel?'<text x="'+size/2+'" y="'+(size/2+fs*0.55)+'" text-anchor="middle" style="font-size:'+Math.max(9,fs*0.38)+'px;fill:'+c+';font-weight:500;font-family:Inter,sans-serif">'+scoreLabel(s)+'</text>':'';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    +'<g transform="rotate(135,'+size/2+','+size/2+')">'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#E5E7EB" stroke-width="'+sw+'" stroke-dasharray="'+arcLen+' '+gapLen+'" stroke-linecap="round"/>'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="'+sw+'" stroke-dasharray="'+arcLen+' '+gapLen+'" stroke-dashoffset="'+offset+'" stroke-linecap="round" style="transition:stroke-dashoffset .8s ease"/>'
    +'</g>'
    +'<text x="'+size/2+'" y="'+(size/2-(showLabel?fs*0.12:0))+'" text-anchor="middle" dominant-baseline="central" style="font-size:'+fs+'px;font-weight:700;fill:'+numColor+';font-family:Inter,sans-serif">'+s+'</text>'
    +lbl
    +'</svg>';
}

function renderScoreBooster(){
  const r=state.results;if(!r||!r.score_booster||!r.score_booster.available)return'';
  const sb=r.score_booster;
  if(sb.total_boost<=0)return'';
  
  // Initialize simulator state
  if(!window._simState)window._simState={};
  
  const cur=Math.round(sb.current_score);
  const allOpps=sb.all_opportunities||sb.top_opportunities||[];
  
  // Calculate simulated score based on toggled opportunities
  let simBoost=0;
  allOpps.forEach(opp=>{
    if(window._simState[opp.check_id])simBoost+=opp.projected_boost;
  });
  const simScore=Math.min(Math.round(cur+simBoost),100);
  const pot=sb.potential_score;
  const activeCount=Object.values(window._simState).filter(v=>v).length;
  
  let oppCards='';
  allOpps.slice(0,6).forEach(opp=>{
    const checked=window._simState[opp.check_id]?'checked':'';
    const rec=opp.recommendation||{};
    const docLink=rec.docs_url?`<a href="${esc(rec.docs_url)}" target="_blank" style="font-size:11px;color:#2563EB;display:inline-block">Docs \u2197</a>`:'';
    oppCards+=`<div class="card" style="padding:12px;margin-bottom:6px;border-left:3px solid ${checked?'#2D6A4F':'#E5E7EB'};transition:all .2s">
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
        <input type="checkbox" class="sim-toggle" data-cid="${esc(opp.check_id)}" ${checked} style="margin-top:2px;accent-color:#2D6A4F;width:15px;height:15px;cursor:pointer;flex-shrink:0">
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <span style="font-size:13px;font-weight:600">${esc(opp.name)}</span>
            <span style="font-size:12px;font-weight:700;color:#2D6A4F;background:#ECFDF5;padding:2px 8px;border-radius:10px;white-space:nowrap">+${opp.projected_boost} pts</span>
          </div>
          <div style="font-size:11px;color:#6B7280;margin-top:3px">${esc(opp.current_value||'')}</div>
          <div style="font-size:11px;color:#9CA3AF;font-style:italic;margin-top:2px">${esc(opp.peer_benchmark||'')}</div>
          ${docLink}
        </div>
      </label>
    </div>`;
  });
  
  const moreCount=allOpps.length-6;
  const moreLink=moreCount>0?`<div style="text-align:center;margin-top:8px"><a href="#" id="viewAllAdoption" style="font-size:13px;color:#2563EB;font-weight:500">See all ${allOpps.length} opportunities \u2197</a></div>`:'';
  
  return `<div class="card" style="padding:24px;margin-top:24px;background:linear-gradient(135deg,#F8FAFC 0%,#F1F5F9 100%);border:1px solid #CBD5E1">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:16px;font-weight:700;color:#1B3139">Score Simulator</div>
        <div style="font-size:13px;color:#6B7280;margin-top:2px">${activeCount>0?'Toggle capabilities to see your projected score change':'Check the boxes below to simulate your potential score'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#374151">${cur}</div><div style="font-size:11px;color:#9CA3AF">Current</div></div>
        <div style="font-size:18px;color:#9CA3AF">\u2192</div>
        <div style="text-align:center"><div id="simScoreDisplay" style="font-size:24px;font-weight:700;color:${simBoost>0?'#2D6A4F':'#1B3139'};transition:all .3s">${simScore}</div><div style="font-size:11px;color:${simBoost>0?'#2D6A4F':'#374151'}">${simBoost>0?'Simulated':'Potential'}</div></div>
      </div>
    </div>
    <div style="margin-bottom:16px;position:relative">
      <div style="height:8px;background:#E5E7EB;border-radius:4px;overflow:visible;position:relative">
        <div style="height:100%;width:${Math.min(cur,100)}%;background:#374151;border-radius:4px;position:absolute;z-index:3"></div>
        <div style="height:100%;width:${Math.min(simScore,100)}%;background:#86EFAC;border-radius:4px;position:absolute;z-index:2;transition:width .4s ease"></div>
        <div style="height:100%;width:${Math.min(pot,100)}%;background:#BBF7D0;border-radius:4px;position:absolute;z-index:1"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">

    </div>
    <div style="max-height:360px;overflow-y:auto">${oppCards}</div>

function getSettingsUrl(checkId){
  const map={
    '4.2.1':'/sql/warehouses','4.2.2':'/compute','4.5.3':'/sql/warehouses',
    '4.1.2':'/workflows','4.5.2':'/compute',
    '5.1.1':'/settings/workspace/ip-access-lists','5.2.5':'/settings/workspace/developer',
    '5.2.6':'/settings/workspace/identity-and-access',
    '1.2.1':'/settings/workspace/predictive-optimization',
    '6.1.1':'/data-management/unity-catalog',
    '3.1.1':'/compute','3.1.2':'/compute',
    '5.3.5':'/compute',
  };
  const path=map[checkId]||'';
  if(!path)return'';
  const wsHost=window._workspaceHost||(state.results&&state.results.diagnostics&&state.results.diagnostics.workspace_host)||'';
  return wsHost?wsHost+path:path;
}
function initWorkspaceHost(){
  // Try to get workspace host from the o= param or API
  const params=new URLSearchParams(window.location.search);
  const orgId=params.get('o');
  if(orgId){
    // Standard Databricks workspace URL pattern
    fetch('/api/workspace-host').then(r=>r.json()).then(d=>{
      if(d.host)window._workspaceHost=d.host;
    }).catch(()=>{});
  }
  // Also try direct fetch
  fetch('/api/workspace-host').then(r=>r.json()).then(d=>{
    if(d.host)window._workspaceHost=d.host;
  }).catch(()=>{});
}
initWorkspaceHost();

function renderSavingsTicker(){
  const br=state.results&&state.results.burn_rate;
  if(!br||!br.available||br.total_monthly_waste<1)return'';
  
  // Initialize ticker state
  if(!window._tickerState){
    window._tickerState={start:Date.now(),toggles:{},baseRate:br.per_second};
  }
  
  // Calculate current effective rate based on toggles
  let effectiveRate=br.per_second;
  let totalSaved=0;
  (br.sources||[]).forEach(s=>{
    if(window._tickerState.toggles[s.id]){
      effectiveRate-=s.per_second;
      totalSaved+=s.monthly_waste;
    }
  });
  effectiveRate=Math.max(0,effectiveRate);
  
  // Build source toggles
  let toggles='';
  (br.sources||[]).slice(0,6).forEach(s=>{
    const checked=window._tickerState.toggles[s.id]?'checked':'';
    const saveMo=s.monthly_waste;
    toggles+=`<label style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6;cursor:pointer">
      <input type="checkbox" class="ticker-toggle" data-sid="${s.id}" ${checked} style="margin-top:2px;accent-color:#FF3621;width:16px;height:16px;cursor:pointer">
      <div style="flex:1"><div style="font-size:13px;font-weight:600;color:#1B3139">${esc(s.label)}</div>
      <div style="font-size:11px;color:#6B7280;margin-top:2px">${esc(s.description).substring(0,100)}</div></div>
      <div style="font-size:13px;font-weight:700;color:#2D6A4F;white-space:nowrap">-$${saveMo.toLocaleString(undefined,{maximumFractionDigits:0})}/mo</div>
    </label>`;
  });
  
  const pctReduced=br.total_monthly_waste>0?Math.round(totalSaved/br.total_monthly_waste*100):0;
  const remainingMonthly=Math.max(0,br.total_monthly_waste-totalSaved);
  
  return `<div class="card" style="padding:0;margin-bottom:28px;overflow:hidden;border:1px solid #E5E7EB">
    <div style="background:linear-gradient(135deg,#1B3139,#2D3F48);padding:24px 28px;color:white">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.5);margin-bottom:6px">Live Savings Opportunity</div>
          <div style="display:flex;align-items:baseline;gap:8px">
            <span id="tickerAmount" style="font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;color:#FF6B4A">$0.00</span>
            <span style="font-size:13px;color:rgba(255,255,255,0.5)">wasted since this report loaded</span>
          </div>
        </div>
        <div style="text-align:right">
          <div id="tickerRate" style="font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:${effectiveRate>0?'#FF6B4A':'#2D6A4F'}">$${effectiveRate.toFixed(4)}/sec</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">
            $${Math.round(effectiveRate*86400).toLocaleString()}/day &middot; $${Math.round(remainingMonthly).toLocaleString()}/mo &middot; $${Math.round(remainingMonthly*12).toLocaleString()}/yr
          </div>
        </div>
      </div>
      ${pctReduced>0?`<div style="margin-top:12px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pctReduced}%;background:#2D6A4F;border-radius:2px;transition:width .5s ease"></div></div>
      <div style="font-size:11px;color:#2D6A4F;margin-top:4px;font-weight:600">${pctReduced}% of waste eliminated by selected optimizations</div>`:''}
    </div>
    <div style="padding:20px 28px;background:white">
      <div style="font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Toggle optimizations to see the ticker slow down</div>
      ${toggles}
    </div>
  </div>`;
}

function renderCostOverview(){
  const r=state.results;if(!r)return'';
  const allRecs=r.top_recommendations||[];
  const thisWeek=allRecs.filter(rec=>rec.priority==='high'&&!isQuickWin(rec.check_id));
  const thisMonth=allRecs.filter(rec=>rec.priority==='medium'&&!isQuickWin(rec.check_id));
  const thisQuarter=allRecs.filter(rec=>rec.priority==='low'&&!isQuickWin(rec.check_id));

  function renderRecCard(rec){
    const pc=rec.priority==='high'?'#9B2C2C':rec.priority==='medium'?'#B7791F':'#6B7280';
    const prompt=rec.action||'Help me fix: '+rec.check_name;
    const docsLink=rec.docs_url?`<a href="${esc(rec.docs_url)}" target="_blank" style="font-size:11px;color:#6B7280">Docs \u2197</a>`:'';
    const dollarBadge=rec.dollar_impact?`<span style="font-size:11px;font-weight:600;color:#2D6A4F;background:#ECFDF5;padding:2px 8px;border-radius:10px">${esc(rec.dollar_impact)}</span>`:'';
    return `<div class="card" style="padding:14px;border-left:3px solid ${pc};margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(rec.check_name)}</div>
        <div style="font-size:12px;color:#6B7280;margin-top:3px">${esc(rec.action||'')}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          ${dollarBadge}
          <span style="font-size:11px;color:#9CA3AF">${esc(rec.section_name)}</span>
        </div>
      </div>
      <div style="margin-top:6px;display:flex;gap:8px;align-items:center">
        <button class="btn fixit-btn" data-prompt="${esc(prompt)}" style="padding:4px 10px;font-size:11px;font-weight:600;background:#2D6A4F;color:white;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:4px">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Fix It</button>
        ${docsLink}
      </div>
    </div>`;
  }

  function renderPhase(label,icon,items,color){
    if(items.length===0)return'';
    let cards='';items.forEach(rec=>{cards+=renderRecCard(rec)});
    const needsScroll=items.length>4;
    const scrollStyle=needsScroll?'max-height:300px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#CBD5E1 transparent':'';
    return `<div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:24px;height:24px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:12px;color:white;font-weight:700">${icon}</div>
        <span style="font-size:14px;font-weight:600;color:#1B3139">${label}</span>
        <span style="font-size:12px;color:#9CA3AF">(${items.length})</span>
      </div>
      <div style="${scrollStyle}">${cards}</div>
    </div>`;
  }

  let roadmapHtml='';
  roadmapHtml+=renderPhase('This Week','!',thisWeek,'#9B2C2C');

function renderDetailTable(items){
  if(!items||!items.length)return'';
  if(typeof items[0]!=='object')return'';
  const cols=Object.keys(items[0]);
  const hdr=cols.map(c=>`<th>${esc(c.replace(/_/g,' '))}</th>`).join('');
  const tbody=items.map(r=>`<tr>${cols.map(c=>{
    const v=r[c];
    const s=String(v??'');
    const display=s.length>80?s.substring(0,77)+'...':s;
    return `<td title="${esc(s)}">${esc(display)}</td>`;
  }).join('')}</tr>`).join('');
  return `<div style="max-height:350px;overflow:auto;border:1px solid #E5E7EB;border-radius:6px"><table class="detail-table"><thead><tr>${hdr}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}

/* Universal detail renderer — handles ALL possible detail keys from any check */
function renderAllDetails(det, checkStatus){
  const bestPracticeBanner='<div style="margin-top:8px;padding:10px 14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:6px;font-size:12px;color:#166534"><strong><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#2D6A4F;margin-right:6px;vertical-align:middle"></span>Best practice achieved.</strong> This check meets or exceeds the target. Continue maintaining this standard.</div>';
  if(!det || typeof det !== 'object' || Object.keys(det).length === 0) {
    if(checkStatus === 'pass') return bestPracticeBanner;
    return '<div style="margin-top:8px;font-size:12px;color:#9CA3AF">No additional details available.</div>';
  }
  if(checkStatus === 'pass') {
    const hasData=Object.values(det).some(function(v){return Array.isArray(v)?v.length>0:v!=null&&v!==''&&v!==0});
    const hasNonConformingData=Object.keys(det).some(function(k){return k==='non_conforming'&&Array.isArray(det[k])&&det[k].length>0});
    if(!hasNonConformingData) return bestPracticeBanner;
  }
  let html='';
  const summary=det.summary||'';
  if(summary) html+=`<div style="margin-top:8px;font-size:12px;color:#6B7280;font-style:italic">${esc(summary)}</div>`;

  // Render all array-type detail keys as tables
  const arrayKeys = Object.keys(det).filter(k => Array.isArray(det[k]) && det[k].length > 0 && typeof det[k][0] === 'object');
  const labelMap = {
    'non_conforming': checkStatus==='pass'?'Details':'Non-conforming resources',
    'classification_summary':'Classification Summary',
    'top_jobs':'Top Jobs','endpoints':'Endpoints','tools':'Tools',
    'external_bi_tools':'External BI Tools','databricks_native':'Databricks Native',
    'active_endpoints':'Active Endpoints','other_tools':'Other Tools',
    'trend':'Trend Data','months':'Monthly Trend'
  };

  arrayKeys.forEach(key=>{
    const items=det[key];
    const label=labelMap[key]||key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const suffix=items.length>=20?' shown, more may exist':'';
    html+=`<div style="margin-top:10px"><div style="font-size:11px;font-weight:600;color:#6B7280;margin-bottom:4px">${label} (${items.length}${suffix})</div>${renderDetailTable(items)}</div>`;
  });

  // Render scalar/object details as key-value pairs
  const peerBenchmark=det.peer_benchmark||'';
  if(peerBenchmark) html+=`<div style="margin-top:8px;padding:10px 14px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;color:#374151"><strong>\u{1F465} Peer Insight:</strong> ${esc(peerBenchmark)}</div>`;
  const projected=det.projected_score_boost||0;
  if(projected>0) html+=`<div style="margin-top:6px;padding:8px 14px;background:#F1F5F9;border:1px solid #CBD5E1;border-radius:6px;font-size:12px;color:#1B3139"><strong>\u{1F4C8} Score Impact:</strong> Adopting this could add <strong>+${projected} points</strong> to your overall health score</div>`;
  const scalarKeys = Object.keys(det).filter(k => !Array.isArray(det[k]) && k !== 'summary' && k !== 'peer_benchmark' && k !== 'projected_score_boost' && det[k] !== null && det[k] !== undefined && typeof det[k] !== 'object');
  if(scalarKeys.length > 0 && arrayKeys.length === 0){
    const items = scalarKeys.map(k => ({metric: k.replace(/_/g,' '), value: det[k]}));
    html+=`<div style="margin-top:10px">${renderDetailTable(items)}</div>`;
  }

  if(!html) html='<div style="margin-top:8px;font-size:12px;color:#9CA3AF">No additional details available.</div>';
  return html;
}

function renderSection(){
  const r=state.results;if(!r||!state.section)return'';

  const checks=sec.checks||[];
  const scored=checks.filter(c=>c.status!=='not_evaluated');
  const grouped={};
  checks.forEach(c=>{const s=c.subsection||'General';if(!grouped[s])grouped[s]=[];grouped[s].push(c)});
  let groups='';
  Object.entries(grouped).forEach(([sub,chks])=>{
    let rows='';
    chks.forEach(c=>{
      const dotColor=c.status==='pass'?'#2D6A4F':c.status==='partial'?'#B7791F':c.status==='fail'?'#9B2C2C':c.status==='info'?'#9CA3AF':'#D1D5DB';
      const icon='<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+dotColor+'"></span>';
      const sc=c.status==='info'?'INFO':c.status==='not_evaluated'?'N/A':c.score;
      const scColor=c.score===100?'#1B3139':c.score===50?'#6B7280':c.status==='info'?'#9CA3AF':'#9CA3AF';
      // Info badge explanation
      const infoBadge=c.status==='info'?'<span style="font-size:10px;color:#6B7280;background:#F3F4F6;padding:1px 6px;border-radius:4px;margin-left:6px" title="Informational metric — not scored, click for details">Informational</span>':'';
      // Recommendation
      let recHtml='';
      if(c.recommendation){
        const rc=c.recommendation;
        const pc=rc.priority==='high'?'#374151':rc.priority==='medium'?'#6B7280':'#9CA3AF';
        recHtml=`<div style="padding:12px;border-left:3px solid ${pc};background:#F9FAFB;border-radius:4px;margin-bottom:8px"><div style="font-size:12px;font-weight:600;margin-bottom:4px">${esc(rc.action||'')}</div><div style="font-size:11px;color:#6B7280">${esc(rc.impact||'')}</div>${rc.estimated_savings?`<div style="font-size:11px;color:#374151;margin-top:2px">\u{1F4B0} ${esc(rc.estimated_savings)}</div>`:''}${rc.docs_url?`<a href="${esc(rc.docs_url)}" target="_blank" style="font-size:11px;color:#2563EB;margin-top:4px;display:inline-block">Documentation \u2197</a>`:''}${rc.sql_command?`<div style="margin-top:4px;font-size:10px;font-family:monospace;background:#F3F4F6;padding:4px 8px;border-radius:4px">${esc(rc.sql_command)}</div>`:''}</div>`;
      }
      // Details — universal renderer for ALL checks
      const detailsHtml = renderAllDetails(c.details||{}, c.status);

      rows+=`<div class="card check-row" style="padding:14px;margin-bottom:6px;cursor:pointer;border:1px solid ${dotColor}22;border-left:3px solid ${dotColor}"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:16px">${icon}</span><div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(c.name)}${infoBadge}</div><div style="font-size:12px;color:#6B7280;margin-top:2px">${esc(c.current_value)} \u00B7 Target: ${esc(c.target_value)}</div></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:#9CA3AF">\u25BC</span><span style="font-size:14px;font-weight:700;color:${scColor};font-variant-numeric:tabular-nums">${sc}</span></div></div><div class="check-detail" style="display:none">${recHtml}${detailsHtml}</div></div>`;
    });
    groups+=`<div style="margin-bottom:24px"><h2 style="font-size:15px;font-weight:600;margin:0 0 10px;padding-bottom:8px;border-bottom:2px solid #E5E7EB">${esc(sub)}</h2>${rows}</div>`;
  });
  return `<div style="padding:32px;max-width:960px;margin:0 auto">
    <button id="backBtn" class="btn" style="background:none;font-size:13px;color:#6B7280;padding:6px 0;margin-bottom:20px">\u2190 Back to Dashboard</button>
    <div class="card" style="padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:24px"><div style="min-width:64px;height:64px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:#F3F4F6;border:1px solid #E5E7EB"><span style="font-size:28px;font-weight:700;color:#1B3139">${sec.score!=null?Math.round(sec.score):'\u2014'}</span></div><div style="flex:1"><h1 style="font-size:22px;font-weight:700;margin:0 0 4px">${esc(sec.section_name||sec.name||'')}</h1>${sec.active&&sec.score!=null?`<div style="display:flex;gap:14px;margin-top:8px"><span style="font-size:13px;color:#6B7280"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#2D6A4F;margin-right:4px"></span><strong style="color:#1B3139">${scored.filter(c=>c.score===100).length}</strong> Pass</span><span style="font-size:13px;color:#6B7280"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#B7791F;margin-right:4px"></span><strong style="color:#6B7280">${scored.filter(c=>c.score===50).length}</strong> Partial</span><span style="font-size:13px;color:#6B7280"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#FF3621;margin-right:4px"></span><strong style="color:#9CA3AF">${scored.filter(c=>c.score===0&&c.status==='fail').length}</strong> Fail</span><span style="font-size:13px;color:#6B7280"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#9CA3AF;margin-right:4px"></span><strong style="color:#6B7280">${checks.filter(c=>c.status==='info').length}</strong> Info</span></div>`:''}</div><div style="flex-shrink:0">${sec.active?v6Badge(sec.section_id,Math.round(sec.score||0),90):''}</div></div>
    
    ${groups}
    ${renderBadgeProgress(sec)}
  </div>`;
}

  if(qfBtn)qfBtn.onclick=()=>{state.view='improvescore';state.section=null;render()};

        },8000);
      }
    }
  } else {

  }

  if(window._tickerInterval)clearInterval(window._tickerInterval);

    const el=document.getElementById('tickerAmount');
    const br=state.results&&state.results.burn_rate;
    if(!el||!br||!br.available)return;
    let rate=br.per_second;
    if(window._tickerState&&window._tickerState.toggles){
      (br.sources||[]).forEach(s=>{if(window._tickerState.toggles[s.id])rate-=s.per_second});

async function loadWarehouses(){
  const sel=document.getElementById('whSelect');
  if(!sel)return;
  sel.innerHTML='<option>Loading warehouses...</option>';
  try{
    const r=await fetch('/api/warehouses');
    const data=await r.json();
    if(data.error){
      sel.innerHTML=`<option>Error: ${esc(data.error).substring(0,80)}</option>`;
      state.error='Warehouse listing failed: '+data.error;
      render();return;
    }
    if(Array.isArray(data)&&data.length>0){
      const serverless=data.filter(w=>w.enable_serverless_compute);
      const list=serverless.length>0?serverless:data;
      sel.innerHTML=list.map(w=>`<option value="${w.id}">${esc(w.name)} (${w.cluster_size}) \u2014 ${w.enable_serverless_compute?'Serverless':w.warehouse_type} \u2014 ${w.state}</option>`).join('');
    } else {
      sel.innerHTML='<option>No warehouses available</option>';
    }
  }catch(e){
    sel.innerHTML=`<option>Error: ${esc(e.message)}</option>`;
  }
}

async function startCheck(){
  const sel=document.getElementById('whSelect');
  if(!sel||!sel.value)return;
  state.error=null;state.view='running';
  state.warehouseId=sel.value;
  state.runState={idx:0,total:9,name:'Initializing...',completed:{}};
  render();
  try{
    const res=await fetch('/api/health-check/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({warehouse_id:sel.value,include_table_analysis:true})});
    if(!res.ok){const e=await res.json();if(res.status===409){
        // Auto-reset stuck run
        await fetch('/api/health-check/reset',{method:'POST'});
        // Retry
        const res2=await fetch('/api/health-check/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({warehouse_id:sel.value,include_table_analysis:true})});
        if(!res2.ok){const e2=await res2.json();throw new Error(e2.error||'Failed after reset');}
      } else {
        throw new Error(e.error||'Failed to start');
      }}
  }catch(e){state.error=e.message;state.view='setup';render();loadWarehouses();return;}

  let sseActive=true;let es;
  function connectSSE(){
    es=new EventSource('/api/health-check/stream');
    es.onmessage=(ev)=>{
      const d=JSON.parse(ev.data);
      if(d.type==='progress'){
        state.runState.idx=d.completed||state.runState.idx;
        state.runState.total=d.total_sections||state.runState.total;
        state.runState.name=d.section_name||state.runState.name;
        render();
      } else if(d.type==='section_complete'){
        state.runState.completed[d.section]={score:d.score,active:d.active,name:d.section_name};
        state.runState.idx=d.completed||state.runState.idx;
        render();
      } else if(d.type==='complete'||d.type==='done'){
        sseActive=false;es.close();
      } else if(d.type==='error'){
        sseActive=false;es.close();
        state.error=d.message;state.view='setup';render();loadWarehouses();
      }
    };
    es.onerror=()=>{es.close();sseActive=false;};
  }
  connectSSE();

  async function pollResults(){
    const maxWait=900000;const start=Date.now();
    while(Date.now()-start<maxWait){
      await new Promise(r=>setTimeout(r,3000));
      try{
        const r=await fetch('/api/health-check/results');
        if(r.status===202){state.runState.name=state.runState.name||'Processing...';render();continue;}
        if(r.status===500){const e=await r.json();state.error=e.error||'Failed';state.view='setup';render();loadWarehouses();return;}
        if(r.ok){
          const data=await r.json();
          if(data.sections&&data.sections.length>0){
            if(es&&sseActive){es.close();}
            state.results=data;if(data.diagnostics&&data.diagnostics.workspace_host)window._workspaceHost=data.diagnostics.workspace_host;state.view='dashboard';render();return;
          }
        }
      }catch(e){}
    }
    state.error='Health check timed out.';state.view='setup';render();loadWarehouses();
  }
  pollResults();
}

function formatMd(text){
  if(!text)return'';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<div style="font-weight:600;margin:8px 0 4px">$1</div>')
    .replace(/^## (.+)$/gm,'<div style="font-weight:700;font-size:14px;margin:8px 0 4px">$1</div>')
    .replace(/^- (.+)$/gm,'<div style="padding-left:12px">• $1</div>')
    .replace(/^\d+\. (.+)$/gm,'<div style="padding-left:12px">$&</div>')
    .replace(/\n/g,'<br>');
}

async function sendChat(text){
  const input=document.getElementById('chatInput');
  const msg=text||input?.value?.trim();
  if(!msg||window._chatLoading)return;
  if(input)input.value='';

  window._chatMessages.push({role:'user',content:msg});
  window._chatLoading=true;
  refreshChat();

  try{
    const ctx=state.results?{overall:state.results.overall,sections:(state.results.sections||[]).map(s=>({section_name:s.section_name,section_id:s.section_id,score:s.score,active:s.active,checks:(s.checks||[]).filter(c=>c.status==='fail'||c.status==='partial').slice(0,5).map(c=>({name:c.name,status:c.status,current_value:c.current_value,benchmark:c.benchmark,recommendation:c.recommendation}))})),burn_rate:state.results.burn_rate,top_recommendations:(state.results.top_recommendations||[]).slice(0,8)}:null;
    const resp=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:window._chatMessages,context:ctx,warehouse_id:state.warehouseId||''})
    });
    if(!resp.ok){const t=await resp.text();throw new Error('HTTP '+resp.status+': '+t.substring(0,150));}
    const data=await resp.json();
    window._chatMessages.push({role:'assistant',content:data.answer||data.error||'No response.'});
  }catch(e){
    window._chatMessages.push({role:'assistant',content:'Connection error: '+(e.message||'unknown')+'. Check console.'});console.error('Chat error:',e);
  }
  window._chatLoading=false;
  refreshChat();
}

function refreshChat(){
  const panel=document.getElementById('chatPanel');
  const fab=document.getElementById('chatFab');
  if(window._chatOpen){
    if(fab)fab.style.display='none';
    const container=panel?.parentElement||document.body;
    const existing=document.querySelector('.chat-panel');
    if(existing)existing.outerHTML=renderChatPanel();
    else{const d=document.createElement('div');d.innerHTML=renderChatPanel();document.body.appendChild(d.firstElementChild);}
    // Scroll to bottom
    setTimeout(()=>{const ma=document.getElementById('chatMsgArea');if(ma)ma.scrollTop=ma.scrollHeight;},50);
    // Bind close
    const cb=document.getElementById('chatClose');
    if(cb)cb.onclick=()=>{window._chatOpen=false;refreshChat();};
  } else {
    const p=document.querySelector('.chat-panel');if(p)p.remove();
    if(fab)fab.style.display='flex';
  }
}

    +'<text x="'+cx+'" y="54" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="14" font-weight="800" fill="white" letter-spacing="2.5">'+tx[1]+'</text>'

    +'<text x="'+cx+'" y="150" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="8.5" font-weight="700" fill="'+c+'" letter-spacing="3" opacity="0.5">'+tl+'</text>'
    +'<path d="M14,4 L116,4 C121,4 126,9 126,14 L126,133 L65,184 L4,133 L4,14 C4,9 9,4 14,4Z" fill="none" stroke="'+c+'" stroke-width="0.4" opacity="0.1"/>'

  return svg;
}

function v6TierLabel(score){
  const tier=v6GetTier(score);
  if(tier==='none')return '';
  const colors={bronze:'#CD7F32',silver:'#A8A9AD',gold:'#DAA520',perfect:'#8B5CF6'};
  const bgs={bronze:'#FDF2E6',silver:'#F4F4F5',gold:'#FFFBEB',perfect:'#F5F3FF'};
  const labels={bronze:'BRONZE',silver:'SILVER',gold:'GOLD',perfect:'PERFECT'};
  return '<span style="display:inline-flex;align-items:center;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;letter-spacing:0.5px;background:'+bgs[tier]+';color:'+colors[tier]+';border:1px solid '+colors[tier]+'">'+labels[tier]+'</span>';
}

// Badge Progress card
function renderBadgeProgress(sec){
  if(!sec||!sec.active)return '';
  const score=Math.round(sec.score||0);
  const tier=v6GetTier(score);
  const checks=sec.checks||[];
  const failing=checks.filter(function(x){return x.status==='fail'||x.status==='partial'});
  const tiers=[{key:'bronze',label:'Bronze',min:55,color:'#CD7F32',bg:'#FDF2E6'},{key:'silver',label:'Silver',min:70,color:'#A8A9AD',bg:'#F4F4F5'},{key:'gold',label:'Gold',min:85,color:'#DAA520',bg:'#FFFBEB'},{key:'perfect',label:'Perfect',min:100,color:'#8B5CF6',bg:'#F5F3FF'}];
  let milestones='';
  tiers.forEach(function(t){
    const achieved=score>=t.min;
    const isCurrent=(tier===t.key);
    const isNext=!achieved&&!tiers.some(function(x){return x.min>score&&x.min<t.min});
    const ptsNeeded=t.min-score;
    let si=achieved?'<svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="'+t.color+'"/><path d="M8 12l3 3 5-5" stroke="white" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':'<div style="width:16px;height:16px;border-radius:50%;border:2px solid '+(isNext?t.color:'#D1D5DB')+';background:white"></div>';
    let fl='';
    if(isNext&&failing.length>0){
      const sorted=[].concat(failing).sort(function(a,b){return(b.weight||1)-(a.weight||1)});
      fl='<div style="margin:6px 0 0 28px">';
      sorted.slice(0,4).forEach(function(chk){
        const rec=chk.recommendation||{};
        fl+='<div style="font-size:11px;color:#4B5563;margin:3px 0;display:flex;align-items:flex-start;gap:4px"><span style="color:'+t.color+';font-weight:700">\u2192</span><span><strong>'+esc(chk.name)+'</strong>'+(rec.action?' \u2014 '+esc(String(rec.action).substring(0,80)):'')+'</span></div>';
      });
      if(failing.length>4)fl+='<div style="font-size:11px;color:#9CA3AF;margin-left:12px">+'+(failing.length-4)+' more</div>';
      fl+='</div>';
    }
    milestones+='<div style="display:flex;align-items:flex-start;gap:12px;padding:8px 0;'+(isCurrent?'background:'+t.bg+';border-radius:8px;padding:10px 12px;margin:2px -12px':'')+'">'+si+'<div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:13px;font-weight:'+(isCurrent?'700':'600')+';color:'+(achieved?t.color:'#6B7280')+'">'+t.label+'</span><span style="font-size:11px;color:#9CA3AF">('+t.min+'+ pts)</span>'+(isCurrent?'<span style="font-size:10px;background:'+t.color+';color:white;padding:1px 6px;border-radius:8px;font-weight:700">CURRENT</span>':'')+(isNext&&ptsNeeded>0?'<span style="font-size:10px;background:#E5E7EB;color:#374151;padding:1px 6px;border-radius:8px;font-weight:600">'+ptsNeeded+' pts away</span>':'')+'</div>'+fl+'</div></div>';
  });
  const pct=Math.min(100,score);
  const barColor=score>=100?'linear-gradient(90deg,#CD7F32,#A8A9AD,#DAA520,#8B5CF6)':score>=85?'linear-gradient(90deg,#CD7F32,#DAA520)':score>=70?'linear-gradient(90deg,#CD7F32,#A8A9AD)':score>=55?'#CD7F32':'#D1D5DB';
  const tierMarks=tiers.map(function(t){return '<div style="position:absolute;left:'+t.min+'%;top:-4px;height:calc(100% + 8px);width:1px;background:#D1D5DB" title="'+t.label+': '+t.min+'+"></div>'}).join('');
  const badgeHtml=v6Badge(sec.section_id,score,72);
  const tierC=v6GetTier(score);
  const tierLbls={none:'No Badge Yet',bronze:'Bronze',silver:'Silver',gold:'Gold',perfect:'Perfect'};
  const tierClrs={none:'#9CA3AF',bronze:'#CD7F32',silver:'#A8A9AD',gold:'#DAA520',perfect:'#8B5CF6'};
  return '<div class="card" style="padding:24px;margin-top:24px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1B3139" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span style="font-size:16px;font-weight:700;color:#1B3139">Badge Progress</span></div><div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap"><div style="text-align:center">'+badgeHtml+'<div style="margin-top:4px;font-size:12px;font-weight:600;color:'+(tierClrs[tierC]||'#9CA3AF')+'">'+(tierLbls[tierC]||'')+'</div></div><div style="flex:1;min-width:260px"><div style="position:relative;height:8px;background:#F3F4F6;border-radius:4px;margin-bottom:20px;overflow:visible"><div style="height:100%;width:'+pct+'%;background:'+barColor+';border-radius:4px;transition:width .6s ease"></div>'+tierMarks+'<div style="position:absolute;left:'+pct+'%;top:-6px;width:20px;height:20px;background:white;border:2px solid '+(tierClrs[tierC]||'#9CA3AF')+';border-radius:50%;transform:translateX(-50%);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:'+(tierClrs[tierC]||'#6B7280')+'">'+score+'</div></div>'+milestones+'</div></div></div>';
}

// ── CONFETTI (gold 85-99) ──
function fireConfetti(x,y){
  let canvas=document.getElementById('confettiCanvas');
  if(!canvas){canvas=document.createElement('canvas');canvas.id='confettiCanvas';canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';document.body.appendChild(canvas);}
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const colors=['#FFD700','#DAA520','#FDE68A','#F59E0B','#FBBF24','#F0C420','#EAB308','#D4A420'];
  const particles=[];
  for(let i=0;i<60;i++){
    particles.push({x:x||canvas.width/2,y:y||canvas.height/3,vx:(Math.random()-0.5)*14,vy:Math.random()*-12-3,color:colors[Math.floor(Math.random()*colors.length)],size:Math.random()*5+3,rotation:Math.random()*360,rotSpeed:(Math.random()-0.5)*8,gravity:0.22,drag:0.98,life:1,decay:Math.random()*0.012+0.008,shape:Math.random()>0.5?'rect':'circle'});
  }
  let frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(function(p){
      if(p.life<=0)return;alive=true;
      p.vy+=p.gravity;p.vx*=p.drag;p.x+=p.vx;p.y+=p.vy;p.rotation+=p.rotSpeed;p.life-=p.decay;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rotation*Math.PI/180);ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
      if(p.shape==='rect')ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    frame++;
    if(alive&&frame<150)requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  animate();
}

// ── FIREWORKS (perfect 100) ──
function fireFireworks(x,y){
  let canvas=document.getElementById('confettiCanvas');
  if(!canvas){canvas=document.createElement('canvas');canvas.id='confettiCanvas';canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';document.body.appendChild(canvas);}
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const rockets=[];const sparks=[];
  const palettes=[['#8B5CF6','#A78BFA','#C4B5FD','#DDD6FE','#7C3AED'],['#FFD700','#FDE68A','#F59E0B','#FBBF24','#EAB308'],['#FF3621','#FF6B5A','#FF8E7A','#FC5C65','#E85555']];
  // Launch 5 rockets from bottom
  for(let i=0;i<5;i++){
    const tx=(x||canvas.width/2)+(Math.random()-0.5)*300;
    const ty=(y||canvas.height/3)+(Math.random()-0.5)*100;
    rockets.push({x:tx,y:canvas.height+10,tx:tx,ty:ty,vy:-12-Math.random()*4,vx:(Math.random()-0.5)*2,life:1,palette:palettes[i%palettes.length],exploded:false,trail:[]});
  }
  let frame=0;
  function animate(){
    ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(0,0,canvas.width,canvas.height);
    // Update rockets
    rockets.forEach(function(r){
      if(r.exploded)return;
      r.trail.push({x:r.x,y:r.y,life:1});
      r.y+=r.vy;r.x+=r.vx;r.vy+=0.15;
      // Draw trail
      r.trail.forEach(function(t,ti){
        t.life-=0.04;
        if(t.life>0){ctx.beginPath();ctx.arc(t.x,t.y,2*t.life,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+t.life*0.6+')';ctx.fill();}
      });
      // Draw rocket
      ctx.beginPath();ctx.arc(r.x,r.y,3,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
      // Explode when velocity slows
      if(r.vy>-2||r.y<r.ty){
        r.exploded=true;
        for(let j=0;j<40;j++){
          const angle=Math.random()*Math.PI*2;
          const speed=Math.random()*6+2;
          sparks.push({x:r.x,y:r.y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,color:r.palette[Math.floor(Math.random()*r.palette.length)],life:1,decay:Math.random()*0.01+0.008,size:Math.random()*3+1.5,gravity:0.06,trail:[]});
        }
      }
    });
    // Update sparks
    let alive=false;
    sparks.forEach(function(s){
      if(s.life<=0)return;alive=true;
      s.trail.push({x:s.x,y:s.y,life:0.6});
      s.vy+=s.gravity;s.vx*=0.98;s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
      // Spark trails
      s.trail.forEach(function(t){t.life-=0.06;if(t.life>0){ctx.beginPath();ctx.arc(t.x,t.y,s.size*0.5*t.life,0,Math.PI*2);ctx.fillStyle=s.color;ctx.globalAlpha=t.life*0.3;ctx.fill();ctx.globalAlpha=1;}});
      // Spark
      ctx.beginPath();ctx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2);ctx.fillStyle=s.color;ctx.globalAlpha=s.life;ctx.fill();ctx.globalAlpha=1;
    });
    // Check if rockets still flying
    const rocketsFlying=rockets.some(function(r){return !r.exploded});
    // Second wave at frame 80
    if(frame===80){
      for(let i=0;i<3;i++){
        const tx2=(x||canvas.width/2)+(Math.random()-0.5)*400;
        const ty2=(y||canvas.height/3)+(Math.random()-0.5)*150;
        rockets.push({x:tx2,y:canvas.height+10,tx:tx2,ty:ty2,vy:-10-Math.random()*4,vx:(Math.random()-0.5)*3,life:1,palette:palettes[i%palettes.length],exploded:false,trail:[]});
      }
    }
    frame++;
    if((alive||rocketsFlying)&&frame<500)requestAnimationFrame(animate);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);}
  }
  animate();
}
