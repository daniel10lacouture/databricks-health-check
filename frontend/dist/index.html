<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Databricks Account Health Check</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#FF3621;--dark:#1B3139;--white:#FFF;--surface:#F5F7FA;--text:#1B1F23;--text2:#6B7280;--text3:#9CA3AF;--border:#E5E7EB;--excellent:#1B3139;--good:#374151;--warn:#6B7280;--crit:#9CA3AF}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface);color:var(--text)}
.btn{border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.card{background:var(--white);border-radius:8px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.08)}
select{font-family:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease-out}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.skeleton{background:var(--surface);border-radius:4px;animation:pulse 1.5s infinite}
.detail-table{width:100%;border-collapse:collapse;font-size:11px}
.detail-table th{text-align:left;padding:5px 8px;font-weight:600;color:#374151;border-bottom:2px solid #E5E7EB;background:#F9FAFB;position:sticky;top:0}
.detail-table td{padding:4px 8px;color:#4B5563;border-bottom:1px solid #F3F4F6;word-break:break-word;max-width:300px}
.detail-table tr:hover td{background:#F0F4FF}
.check-row{transition:all .15s}
.check-row:hover{border-color:#93C5FD;box-shadow:0 2px 8px rgba(37,99,235,.12)}
.check-detail{border-top:1px solid #F3F4F6;margin-top:10px;padding-top:10px}

    /* Smooth view transitions */
    #root { transition: opacity 0.25s ease; }
    #root.fading { opacity: 0; }
    
    /* Score reveal animation */
    @keyframes countUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .score-reveal { animation: countUp 0.6s ease-out forwards; }
    
    /* Ticker pulse */
    @keyframes tickPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.85; } }
    #tickerAmount { animation: tickPulse 2s ease-in-out infinite; }
    
    /* History badge */
    .history-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 12px; }
    .history-up { color: #2D6A4F; background: #ECFDF5; }
    .history-down { color: #9B2C2C; background: #FEF2F2; }
    .history-same { color: #6B7280; background: #F3F4F6; }

/* v2.3.0 - Cost Banner Fix - 1776386259.4092128 */
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
let state = { view:'setup', results:null, section:null, runState:{idx:0,total:12,name:'',completed:{}}, error:null };

const SECTIONS=[
{id:'data_engineering',name:'Data Engineering & Table Health',icon:'\u{1F4CA}',type:'core'},
{id:'sql_analytics',name:'Data Warehousing / SQL Analytics',icon:'\u{1F4C8}',type:'core'},
{id:'compute',name:'Compute Management',icon:'\u2699\uFE0F',type:'core'},
{id:'cost_optimization',name:'Cost Optimization',icon:'\u{1F4B0}',type:'core'},
{id:'security',name:'Security & Compliance',icon:'\u{1F6E1}\uFE0F',type:'core'},
{id:'governance',name:'Governance (Unity Catalog)',icon:'\u{1F512}',type:'core'},
{id:'ai_ml',name:'AI & ML Workloads',icon:'\u{1F9E0}',type:'conditional'},
{id:'bi_tooling',name:'BI & Tooling Adoption',icon:'\u{1F4CA}',type:'advisory'},
{id:'apps',name:'Databricks Apps',icon:'\u{1F4F1}',type:'conditional'},
{id:'lakebase',name:'OLTP / Lakebase',icon:'\u{1F5A5}\uFE0F',type:'conditional'},
{id:'delta_sharing',name:'Delta Sharing',icon:'\u{1F517}',type:'conditional'},
{id:'workspace_admin',name:'Workspace Administration',icon:'\u{1F527}',type:'core'},
{id:'adoption',name:'Platform Adoption',icon:'\u{1F680}',type:'advisory'}
];

function scoreColor(s){return s>=90?'#1B3139':s>=70?'#374151':s>=50?'#6B7280':'#9CA3AF'}
function scoreLabel(s){return s>=90?'Excellent':s>=70?'Good':s>=50?'Needs Attention':'Critical'}
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

function render(){
  const root=document.getElementById('root');
  const prevView=root.dataset.view||'';
  const newView=state.view;
  
  function doRender(){
    if(newView==='setup') root.innerHTML=renderSetup();
    else if(newView==='running') root.innerHTML=renderRunning();
    else if(newView==='dashboard'){
      root.innerHTML=renderApp(renderDashboard());
      // Score reveal animation
      if(prevView==='running'||!root.dataset.revealed){
        root.dataset.revealed='1';
        animateScoreReveal();
        saveToHistory();
      }
    }
    else if(newView==='section') root.innerHTML=renderApp(renderSection());
    root.dataset.view=newView;
    bindEvents();
  }
  
  // Smooth fade transition between major views
  if(prevView&&prevView!==newView&&(prevView==='running'||newView==='running'||prevView==='setup')){
    root.classList.add('fading');
    setTimeout(()=>{doRender();root.classList.remove('fading')},200);
  } else {
    doRender();
  }
}

function animateScoreReveal(){
  const ov=state.results&&state.results.overall;
  if(!ov||!ov.overall_score)return;
  const target=Math.round(ov.overall_score);
  const els=document.querySelectorAll('svg text');
  let scoreEl=null;
  els.forEach(el=>{if(el.textContent==String(target)&&el.style.fontSize&&parseInt(el.style.fontSize)>20)scoreEl=el});
  if(!scoreEl)return;
  let current=0;
  const duration=1500;
  const start=Date.now();
  function tick(){
    const elapsed=Date.now()-start;
    const progress=Math.min(elapsed/duration,1);
    // Ease out cubic
    const eased=1-Math.pow(1-progress,3);
    current=Math.round(eased*target);
    scoreEl.textContent=current;
    if(progress<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  // Also reset ticker start time
  if(window._tickerState)window._tickerState.start=Date.now();
}

function saveToHistory(){
  try{
    const ov=state.results&&state.results.overall;
    if(!ov||!ov.overall_score)return;
    const history=JSON.parse(localStorage.getItem('hc_history')||'[]');
    history.push({
      score:Math.round(ov.overall_score),
      maturity:ov.maturity_label||'',
      timestamp:new Date().toISOString(),
      sections:(state.results.sections||[]).filter(s=>s.active).map(s=>({id:s.section_id,score:Math.round(s.score||0)}))
    });
    // Keep last 20 runs
    if(history.length>20)history.splice(0,history.length-20);
    localStorage.setItem('hc_history',JSON.stringify(history));
  }catch(e){}
}

function getHistoryBadge(){
  try{
    const history=JSON.parse(localStorage.getItem('hc_history')||'[]');
    if(history.length<2)return'';
    const prev=history[history.length-2];
    const curr=state.results&&state.results.overall;
    if(!curr||!curr.overall_score)return'';
    const diff=Math.round(curr.overall_score)-prev.score;
    if(diff===0)return'<span class="history-badge history-same">= same as last run</span>';
    const cls=diff>0?'history-up':'history-down';
    const arrow=diff>0?'\u2191':'\u2193';
    const ago=prev.timestamp?new Date(prev.timestamp).toLocaleDateString():'previous run';
    return'<span class="history-badge '+cls+'">'+arrow+' '+Math.abs(diff)+' pts vs '+ago+'</span>';
  }catch(e){return''}
}


function getLastRunBadge(){
  try{
    const h=JSON.parse(localStorage.getItem('hc_history')||'[]');
    if(h.length===0)return'';
    const last=h[h.length-1];
    const dt=new Date(last.timestamp).toLocaleDateString();
    return '<div style="margin-top:16px;padding:10px 16px;border-radius:8px;background:#F8FAFC;border:1px solid #E2E8F0;font-size:13px;color:#6B7280;display:inline-flex;align-items:center;gap:10px"><span style="font-weight:700;font-size:20px;color:#1B3139">'+last.score+'</span><span>Last score &middot; '+dt+'</span></div>';
  }catch(e){return''}
}

function renderSetup(){
  return `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px;background:#1B3139">
    <div style="width:100%;max-width:460px;border-radius:20px;background:white;box-shadow:0 25px 60px rgba(0,0,0,0.4);padding:48px 40px;text-align:center">
      <div style="width:52px;height:52px;border-radius:14px;background:#FF3621;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px"><svg width="20" height="20" viewBox="33 0 28.2 30.5" xmlns="http://www.w3.org/2000/svg"><path d="M59.7279 12.5153L47.2039 19.6185L33.8814 12.0502L33.251 12.3884V17.885L47.2039 25.8339L59.7279 18.7306V21.648L47.2039 28.7513L33.8814 21.1829L33.251 21.5212V22.4514L47.2039 30.4002L61.1989 22.4514V16.9548L60.5685 16.6165L47.2039 24.1849L34.7219 17.0816V14.2065L47.2039 21.2675L61.1989 13.3186V7.9066L60.4844 7.52607L47.2039 15.0521L35.3943 8.32941L47.2039 1.64897L56.9541 7.14554L57.8367 6.68044V6.00394L47.2039 0L33.251 7.9066V8.75223L47.2039 16.7011L59.7279 9.59785V12.5153Z" fill="white"/></svg></div>
      <h1 style="font-size:24px;font-weight:700;margin:0 0 8px;color:#1B3139">Account Health Check</h1>
      <p style="font-size:14px;color:#6B7280;line-height:1.6;margin:0 0 20px">80+ checks across 13 categories with cost optimization,<br>security analysis, and actionable drill-downs.</p>` + getLastRunBadge() + `
      <div style="margin-top:24px;text-align:left">
        <label style="font-size:13px;font-weight:600;margin-bottom:8px;display:block;color:#374151">SQL Warehouse</label>
        <select id="whSelect" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:14px;background:white;color:#1B3139">
          <option>Loading warehouses...</option>
        </select>
        ${state.error?`<div style="margin-top:12px;padding:10px;border-radius:8px;background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;font-size:13px">${esc(state.error)}</div>`:''}
        <button id="runBtn" class="btn" style="width:100%;margin-top:20px;padding:14px;border-radius:8px;font-size:15px;font-weight:600;background:#FF3621;color:white;border:none;cursor:pointer">Run Health Check</button>
        <p style="margin-top:10px;font-size:12px;color:#9CA3AF;text-align:center">Typical run: 2\u20135 minutes</p>
      </div>
    </div>
  </div>`;
}

function renderRunning(){
  const rs=state.runState;
  const pct=rs.total?Math.round((rs.idx/rs.total)*100):0;
  const sIcons={
    data_engineering:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>',
    sql_analytics:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><path d="M3 20h18M5 20V10M9 20V4M13 20v-8M17 20V8M21 20V2"/></svg>',
    compute:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8l2.8-2.8M17 7l2.8-2.8"/></svg>',
    cost_optimization:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/></svg>',
    security:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
    governance:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/><circle cx="12" cy="16" r="1"/></svg>',
    ai_ml:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><path d="M12 2a4 4 0 014 4c0 1.1-.4 2-1 2.8L12 12l-3-3.2A4 4 0 0112 2zM4 14l4-2 4 4 4-4 4 2v5a1 1 0 01-1 1H5a1 1 0 01-1-1v-5z"/></svg>',
    bi_tooling:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
    apps:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="4"/><path d="M8 2v20M2 8h20"/></svg>',
    lakebase:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5"/><path d="M3 12c0 1.7 4 3 9 3s9-1.3 9-3"/></svg>',
    delta_sharing:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><circle cx="6" cy="12" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><path d="M8.6 13.5l6.8 3M8.6 10.5l6.8-3"/></svg>',
    workspace_admin:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.8-3.8a3 3 0 01-4.2 4.2L7 20l-4 1 1-4 10.3-10.3a3 3 0 014.2-4.2"/></svg>',
    adoption:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>'
  };
  const didYouKnow=[
    "Databricks supports vector indexes with embedding models like databricks-gte-large-en and databricks-bge-large-en, plus external models from OpenAI, Google, and Cohere \u2014 all governed through Unity Catalog.",
    "The Databricks Mobile app lets you monitor jobs, view AI/BI Dashboards, and interact with Databricks Apps like this one \u2014 all from your phone.",
    "You can call AI models directly from SQL using ai_query(), ai_classify(), ai_extract(), and ai_forecast() \u2014 no Python required.",
    "Genie lets business users ask data questions in plain English and get instant answers. Set up a Genie space for your team in minutes.",
    "AI/BI Dashboards can be shared with stakeholders as consumer users \u2014 they get interactive, governed analytics without needing a Databricks login or SQL skills, and every dashboard includes a Genie-powered Q&A button built in.",
    "Predictive Optimization automatically runs OPTIMIZE and VACUUM on your Delta tables \u2014 eliminating the need for manual maintenance jobs entirely.",
    "Liquid Clustering replaces traditional partitioning with adaptive, automatic data layout that continuously optimizes for your actual query patterns.",
    "Delta Sharing is an open protocol that lets you share live data across organizations and clouds without copying \u2014 and recipients don\u2019t even need Databricks.",
    "You can build, evaluate, and deploy production AI agents entirely within Databricks using Mosaic AI Agent Framework \u2014 complete with retrieval, tool calling, guardrails, and human feedback loops.",
    "Lakebase brings fully managed OLTP database capabilities to the Lakehouse \u2014 run transactional workloads with row-level reads and writes, all governed by Unity Catalog, without needing an external database."
  ];
  if(!window._dykIdx)window._dykIdx=Math.floor(Math.random()*didYouKnow.length);
    const dykText=didYouKnow[window._dykIdx];

  let cards='';
  SECTIONS.forEach(s=>{
    const c=rs.completed[s.id];
    const icon=sIcons[s.id]||'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg>';
    const scoreHtml=c?`<div class="fade-in" style="margin-top:6px;font-size:22px;font-weight:700;color:${c.active?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.3)'}">${c.active?Math.round(c.score):'N/A'}</div>`
      :`<div class="skeleton" style="margin-top:6px;height:22px;width:40px;background:rgba(255,255,255,0.05)"></div>`;
    cards+=`<div style="padding:16px;border-radius:8px;background:rgba(255,255,255,${c?'0.07':'0.03'});border:1px solid rgba(255,255,255,0.08);opacity:${c?1:0.5};transition:all .3s"><div style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:8px">${icon} ${esc(s.name)}</div>${scoreHtml}</div>`;
  });
  return `<div style="min-height:100vh;background:#1B3139;padding:32px">
    <div style="max-width:1100px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px"><div style="width:28px;height:28px;border-radius:6px;background:#FF3621;display:flex;align-items:center;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.5L19 9l-7 3.5L5 9l7-4.5z"/></svg></div><span style="font-size:18px;font-weight:700;color:white">Account Health Check</span></div>
      <div style="height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-bottom:12px"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#FF3621,#FF6B4A);border-radius:2px;transition:width .5s ease"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:32px"><span>Completed ${rs.idx} of ${rs.total} sections ${rs.name?'<strong style="color:rgba(255,255,255,0.8)">\u2014 '+esc(rs.name)+'</strong>':''}</span><span style="color:#FF6B4A;font-weight:600">${pct}%</span></div>
      <div style="text-align:center;margin-bottom:40px;padding:24px 32px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06)">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#FF6B4A;margin-bottom:10px">Did You Know</div>
        <div id="dykText" style="font-size:14px;color:rgba(255,255,255,0.75);line-height:1.6;max-width:640px;margin:0 auto;transition:opacity .4s ease">${esc(dykText)}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">${cards}</div>
    </div>
  </div>`;
}

function renderApp(content){
  const r=state.results;const ov=r?.overall;
  let sideItems='';
  SECTIONS.forEach(s=>{
    const sec=(r?.sections||[]).find(x=>x.section_id===s.id);
    const isSel=state.section===s.id;
    const badge=sec?.active&&sec?.score!=null?`<span style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.85)">${Math.round(sec.score)}</span>`:`<span style="font-size:10px;opacity:0.3">—</span>`;
    sideItems+=`<div class="sidebar-item" data-section="${s.id}" style="padding:8px 14px;cursor:${sec?.active?'pointer':'default'};display:flex;align-items:center;gap:10px;background:${isSel?'rgba(255,255,255,0.1)':'transparent'};border-left:3px solid ${isSel?'#FF3621':'transparent'};transition:all .15s">
      <span style="display:flex;align-items:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7.5V16.5L12 22L22 16.5V7.5L12 2Z" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/><path d="M12 7L7 9.75V15.25L12 18L17 15.25V9.75L12 7Z" fill="rgba(255,255,255,0.5)"/></svg></span>
      <div style="flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.name)}</div>
      ${badge}
    </div>`;
  });
  return `<div style="display:flex;height:100vh">

function renderGaugeSVG(score,size,showLabel){
  const s=Math.max(0,Math.min(100,Math.round(score||0)));
  const sw=size>=120?6:size>=80?5:3;
  const r=(size/2)-sw-2;
  const circ=2*Math.PI*r;
  const arcLen=circ*0.75;
  const gapLen=circ*0.25;
  const filled=(s/100)*arcLen;
  const offset=arcLen-filled;
  const fs=size<55?13:size<80?18:size<110?24:34;
  const c='#FF3621';
  const numColor='#1B3139';
  const lbl=showLabel?'<text x="'+size/2+'" y="'+(size/2+fs*0.55)+'" text-anchor="middle" style="font-size:'+Math.max(9,fs*0.38)+'px;fill:'+c+';font-weight:500;font-family:Inter,sans-serif">'+scoreLabel(s)+'</text>':'';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    +'<g transform="rotate(135,'+size/2+','+size/2+')">'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#E5E7EB" stroke-width="'+sw+'" stroke-dasharray="'+arcLen+' '+gapLen+'" stroke-linecap="round"/>'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="'+sw+'" stroke-dasharray="'+arcLen+' '+gapLen+'" stroke-dashoffset="'+offset+'" stroke-linecap="round" style="transition:stroke-dashoffset .8s ease"/>'
    +'</g>'
    +'<text x="'+size/2+'" y="'+(size/2-(showLabel?fs*0.12:0))+'" text-anchor="middle" dominant-baseline="central" style="font-size:'+fs+'px;font-weight:700;fill:'+numColor+';font-family:Inter,sans-serif">'+s+'</text>'
    +lbl
    +'</svg>';
}

function renderScoreBooster(){
  const r=state.results;if(!r||!r.score_booster||!r.score_booster.available)return'';
  const sb=r.score_booster;
  if(sb.total_boost<=0)return'';
  
  // Initialize simulator state
  if(!window._simState)window._simState={};
  
  const cur=sb.current_score;
  const allOpps=sb.all_opportunities||sb.top_opportunities||[];
  
  // Calculate simulated score based on toggled opportunities
  let simBoost=0;
  allOpps.forEach(opp=>{
    if(window._simState[opp.check_id])simBoost+=opp.projected_boost;
  });
  const simScore=Math.min(Math.round(cur+simBoost),100);
  const pot=sb.potential_score;
  const activeCount=Object.values(window._simState).filter(v=>v).length;
  
  let oppCards='';

        <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#374151">${cur}</div><div style="font-size:11px;color:#9CA3AF">Current</div></div>

function getSettingsUrl(checkId){
  const map={
    '4.2.1':'/sql/warehouses','4.2.2':'/compute','4.5.3':'/sql/warehouses',
    '4.1.2':'/workflows','4.5.2':'/compute',

    '5.2.6':'/settings/workspace/identity-and-access',
    '1.2.1':'/settings/workspace/predictive-optimization',
    '6.1.1':'/data-management/unity-catalog',
    '3.1.1':'/compute','3.1.2':'/compute',
    '5.3.5':'/compute',
  };
  const path=map[checkId]||'';
  if(!path)return'';
  // Get workspace host from the app's API or URL params
  const wsHost=window._workspaceHost||'';
  return wsHost?wsHost+path:path;
}
function initWorkspaceHost(){
  // Try to get workspace host from the o= param or API
  const params=new URLSearchParams(window.location.search);
  const orgId=params.get('o');
  if(orgId){
    // Standard Databricks workspace URL pattern
    fetch('/api/workspace-host').then(r=>r.json()).then(d=>{
      if(d.host)window._workspaceHost=d.host;
    }).catch(()=>{});
  }
  // Also try direct fetch
  fetch('/api/workspace-host').then(r=>r.json()).then(d=>{
    if(d.host)window._workspaceHost=d.host;
  }).catch(()=>{});
}

function renderSavingsTicker(){
  const br=state.results&&state.results.burn_rate;
  if(!br||!br.available||br.total_monthly_waste<1)return'';
  
  // Initialize ticker state
  if(!window._tickerState){
    window._tickerState={start:Date.now(),toggles:{},baseRate:br.per_second};
  }
  
  // Calculate current effective rate based on toggles
  let effectiveRate=br.per_second;
  let totalSaved=0;
  (br.sources||[]).forEach(s=>{
    if(window._tickerState.toggles[s.id]){
      effectiveRate-=s.per_second;
      totalSaved+=s.monthly_waste;
    }
  });
  effectiveRate=Math.max(0,effectiveRate);
  
  // Build source toggles
  let toggles='';
  (br.sources||[]).slice(0,6).forEach(s=>{
    const checked=window._tickerState.toggles[s.id]?'checked':'';
    const saveMo=s.monthly_waste;
    toggles+=`<label style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6;cursor:pointer">

  });
  
  const pctReduced=br.total_monthly_waste>0?Math.round(totalSaved/br.total_monthly_waste*100):0;
  const remainingMonthly=Math.max(0,br.total_monthly_waste-totalSaved);
  
  return `<div class="card" style="padding:0;margin-bottom:28px;overflow:hidden;border:1px solid #E5E7EB">
    <div style="background:linear-gradient(135deg,#1B3139,#2D3F48);padding:24px 28px;color:white">

        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.5);margin-bottom:6px">Live Savings Opportunity</div>

            <span id="tickerAmount" style="font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;color:#FF6B4A">$0.00</span>
            <span style="font-size:13px;color:rgba(255,255,255,0.5)">wasted since this report loaded</span>
          </div>
        </div>
        <div style="text-align:right">
          <div id="tickerRate" style="font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:${effectiveRate>0?'#FF6B4A':'#2D6A4F'}">$${effectiveRate.toFixed(4)}/sec</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">
            $${Math.round(effectiveRate*86400).toLocaleString()}/day &middot; $${Math.round(remainingMonthly).toLocaleString()}/mo &middot; $${Math.round(remainingMonthly*12).toLocaleString()}/yr
          </div>
        </div>
      </div>
      ${pctReduced>0?`<div style="margin-top:12px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pctReduced}%;background:#2D6A4F;border-radius:2px;transition:width .5s ease"></div></div>
      <div style="font-size:11px;color:#2D6A4F;margin-top:4px;font-weight:600">${pctReduced}% of waste eliminated by selected optimizations</div>`:''}
    </div>

function renderDetailTable(items){
  if(!items||!items.length)return'';
  if(typeof items[0]!=='object')return'';
  const cols=Object.keys(items[0]);
  const hdr=cols.map(c=>`<th>${esc(c.replace(/_/g,' '))}</th>`).join('');
  const tbody=items.map(r=>`<tr>${cols.map(c=>{
    const v=r[c];
    const s=String(v??'');
    const display=s.length>80?s.substring(0,77)+'...':s;
    return `<td title="${esc(s)}">${esc(display)}</td>`;
  }).join('')}</tr>`).join('');
  return `<div style="max-height:350px;overflow:auto;border:1px solid #E5E7EB;border-radius:6px"><table class="detail-table"><thead><tr>${hdr}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}

/* Universal detail renderer — handles ALL possible detail keys from any check */
function renderAllDetails(det, checkStatus){
  if(!det || typeof det !== 'object' || Object.keys(det).length === 0) {
    if(checkStatus === 'pass') return '<div style="margin-top:8px;padding:10px 14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:6px;font-size:12px;color:#166534"><strong><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#2D6A4F;margin-right:6px;vertical-align:middle"></span>Best practice achieved.</strong> This check meets or exceeds the target. Continue maintaining this standard.</div>';
    return '<div style="margin-top:8px;font-size:12px;color:#9CA3AF">No additional details available.</div>';
  }
  let html='';
  const summary=det.summary||'';
  if(summary) html+=`<div style="margin-top:8px;font-size:12px;color:#6B7280;font-style:italic">${esc(summary)}</div>`;

  // Render all array-type detail keys as tables
  const arrayKeys = Object.keys(det).filter(k => Array.isArray(det[k]) && det[k].length > 0 && typeof det[k][0] === 'object');
  const labelMap = {
    'non_conforming': checkStatus==='pass'?'Details':'Non-conforming resources',
    'classification_summary':'Classification Summary',
    'top_jobs':'Top Jobs','endpoints':'Endpoints','tools':'Tools',
    'external_bi_tools':'External BI Tools','databricks_native':'Databricks Native',
    'active_endpoints':'Active Endpoints','other_tools':'Other Tools',
    'trend':'Trend Data','months':'Monthly Trend'
  };

  arrayKeys.forEach(key=>{
    const items=det[key];
    const label=labelMap[key]||key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const suffix=items.length>=20?' shown, more may exist':'';
    html+=`<div style="margin-top:10px"><div style="font-size:11px;font-weight:600;color:#6B7280;margin-bottom:4px">${label} (${items.length}${suffix})</div>${renderDetailTable(items)}</div>`;
  });

  // Render scalar/object details as key-value pairs
  const peerBenchmark=det.peer_benchmark||'';
  if(peerBenchmark) html+=`<div style="margin-top:8px;padding:10px 14px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;color:#374151"><strong>\u{1F465} Peer Insight:</strong> ${esc(peerBenchmark)}</div>`;
  const projected=det.projected_score_boost||0;
  if(projected>0) html+=`<div style="margin-top:6px;padding:8px 14px;background:#F1F5F9;border:1px solid #CBD5E1;border-radius:6px;font-size:12px;color:#1B3139"><strong>\u{1F4C8} Score Impact:</strong> Adopting this could add <strong>+${projected} points</strong> to your overall health score</div>`;
  const scalarKeys = Object.keys(det).filter(k => !Array.isArray(det[k]) && k !== 'summary' && k !== 'peer_benchmark' && k !== 'projected_score_boost' && det[k] !== null && det[k] !== undefined && typeof det[k] !== 'object');
  if(scalarKeys.length > 0 && arrayKeys.length === 0){
    const items = scalarKeys.map(k => ({metric: k.replace(/_/g,' '), value: det[k]}));
    html+=`<div style="margin-top:10px">${renderDetailTable(items)}</div>`;
  }

  if(!html) html='<div style="margin-top:8px;font-size:12px;color:#9CA3AF">No additional details available.</div>';
  return html;
}

function renderSection(){
  const r=state.results;if(!r||!state.section)return'';
  const sec=(r.sections||[]).find(s=>s.section_id===state.section);if(!sec)return'';
  const checks=sec.checks||[];
  const scored=checks.filter(c=>c.status!=='not_evaluated');
  const grouped={};
  checks.forEach(c=>{const s=c.subsection||'General';if(!grouped[s])grouped[s]=[];grouped[s].push(c)});
  let groups='';
  Object.entries(grouped).forEach(([sub,chks])=>{
    let rows='';
    chks.forEach(c=>{
      const dotColor=c.status==='pass'?'#2D6A4F':c.status==='partial'?'#B7791F':c.status==='fail'?'#9B2C2C':c.status==='info'?'#9CA3AF':'#D1D5DB';
      const icon='<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+dotColor+'"></span>';
      const sc=c.status==='info'?'INFO':c.status==='not_evaluated'?'N/A':c.score;
      const scColor=c.score===100?'#1B3139':c.score===50?'#6B7280':c.status==='info'?'#9CA3AF':'#9CA3AF';
      // Info badge explanation
      const infoBadge=c.status==='info'?'<span style="font-size:10px;color:#6B7280;background:#F3F4F6;padding:1px 6px;border-radius:4px;margin-left:6px" title="Informational metric — not scored, click for details">Informational</span>':'';
      // Recommendation
      let recHtml='';
      if(c.recommendation){
        const rc=c.recommendation;
        const pc=rc.priority==='high'?'#374151':rc.priority==='medium'?'#6B7280':'#9CA3AF';
        recHtml=`<div style="padding:12px;border-left:3px solid ${pc};background:#F9FAFB;border-radius:4px;margin-bottom:8px"><div style="font-size:12px;font-weight:600;margin-bottom:4px">${esc(rc.action||'')}</div><div style="font-size:11px;color:#6B7280">${esc(rc.impact||'')}</div>${rc.estimated_savings?`<div style="font-size:11px;color:#374151;margin-top:2px">\u{1F4B0} ${esc(rc.estimated_savings)}</div>`:''}${rc.docs_url?`<a href="${esc(rc.docs_url)}" target="_blank" style="font-size:11px;color:#2563EB;margin-top:4px;display:inline-block">Documentation \u2197</a>`:''}${rc.sql_command?`<div style="margin-top:4px;font-size:10px;font-family:monospace;background:#F3F4F6;padding:4px 8px;border-radius:4px">${esc(rc.sql_command)}</div>`:''}</div>`;
      }
      // Details — universal renderer for ALL checks
      const detailsHtml = renderAllDetails(c.details||{}, c.status);

      rows+=`<div class="card check-row" style="padding:14px;margin-bottom:6px;cursor:pointer;border:1px solid ${dotColor}22;border-left:3px solid ${dotColor}"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:16px">${icon}</span><div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(c.name)}${infoBadge}</div><div style="font-size:12px;color:#6B7280;margin-top:2px">${esc(c.current_value)} \u00B7 Target: ${esc(c.target_value)}</div></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:#9CA3AF">\u25BC</span><span style="font-size:14px;font-weight:700;color:${scColor};font-variant-numeric:tabular-nums">${sc}</span></div></div><div class="check-detail" style="display:none">${recHtml}${detailsHtml}</div></div>`;
    });
    groups+=`<div style="margin-bottom:24px"><h2 style="font-size:15px;font-weight:600;margin:0 0 10px;padding-bottom:8px;border-bottom:2px solid #E5E7EB">${esc(sub)}</h2>${rows}</div>`;
  });
  return `<div style="padding:32px;max-width:960px;margin:0 auto">
    <button id="backBtn" class="btn" style="background:none;font-size:13px;color:#6B7280;padding:6px 0;margin-bottom:20px">\u2190 Back to Dashboard</button>
    <div class="card" style="padding:24px;display:flex;align-items:center;gap:28px;margin-bottom:24px">${renderGaugeSVG(sec.score||0,100,false)}<div><h1 style="font-size:22px;font-weight:700;margin:0 0 4px">${esc(sec.section_name||sec.name||'')}</h1><div style="display:flex;gap:14px;margin-top:8px"><span style="font-size:13px;color:#6B7280"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#2D6A4F;margin-right:4px"></span><strong style="color:#1B3139">${scored.filter(c=>c.score===100).length}</strong> Pass</span><span style="font-size:13px;color:#6B7280"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#B7791F;margin-right:4px"></span><strong style="color:#6B7280">${scored.filter(c=>c.score===50).length}</strong> Partial</span><span style="font-size:13px;color:#6B7280"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#9B2C2C;margin-right:4px"></span><strong style="color:#9CA3AF">${scored.filter(c=>c.score===0&&c.status==='fail').length}</strong> Fail</span><span style="font-size:13px;color:#6B7280"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#9CA3AF;margin-right:4px"></span><strong style="color:#6B7280">${checks.filter(c=>c.status==='info').length}</strong> Info</span></div></div></div>
    ${groups}
  </div>`;
}

// ── Events ──
function bindEvents(){
  // DYK timer: start when running, clean up otherwise
  if(state.view==='running'){
    if(!window._dykTimer){
      const dykFacts=document.getElementById('dykText');
      if(dykFacts){
        window._dykTimer=setInterval(()=>{
          window._dykIdx=(window._dykIdx+1)%10;
          const el=document.getElementById('dykText');
          if(el){
            el.style.opacity='0';
            setTimeout(()=>{
              const facts=[
                "Databricks supports vector indexes with embedding models like databricks-gte-large-en and databricks-bge-large-en, plus external models from OpenAI, Google, and Cohere \u2014 all governed through Unity Catalog.",
                "The Databricks Mobile app lets you monitor jobs, view AI/BI Dashboards, and interact with Databricks Apps like this one \u2014 all from your phone.",
                "You can call AI models directly from SQL using ai_query(), ai_classify(), ai_extract(), and ai_forecast() \u2014 no Python required.",
                "Genie lets business users ask data questions in plain English and get instant answers. Set up a Genie space for your team in minutes.",
                "AI/BI Dashboards can be shared with stakeholders as consumer users \u2014 they get interactive, governed analytics without needing a Databricks login or SQL skills, and every dashboard includes a Genie-powered Q&A button built in.",
                "Predictive Optimization automatically runs OPTIMIZE and VACUUM on your Delta tables \u2014 eliminating the need for manual maintenance jobs entirely.",
                "Liquid Clustering replaces traditional partitioning with adaptive, automatic data layout that continuously optimizes for your actual query patterns.",
                "Delta Sharing is an open protocol that lets you share live data across organizations and clouds without copying \u2014 and recipients don\u2019t even need Databricks.",
                "You can build, evaluate, and deploy production AI agents entirely within Databricks using Mosaic AI Agent Framework \u2014 complete with retrieval, tool calling, guardrails, and human feedback loops.",
                "Lakebase brings fully managed OLTP database capabilities to the Lakehouse \u2014 run transactional workloads with row-level reads and writes, all governed by Unity Catalog, without needing an external database."
              ];
              el.textContent=facts[window._dykIdx];
              el.style.opacity='1';
            },400);
          }
        },8000);
      }
    }
  } else {
    if(window._dykTimer){clearInterval(window._dykTimer);window._dykTimer=null}
  }
  // Savings ticker update loop
  if(window._tickerInterval)clearInterval(window._tickerInterval);
  window._tickerInterval=setInterval(()=>{
    const el=document.getElementById('tickerAmount');
    const br=state.results&&state.results.burn_rate;
    if(!el||!br||!br.available)return;
    let rate=br.per_second;
    if(window._tickerState&&window._tickerState.toggles){
      (br.sources||[]).forEach(s=>{if(window._tickerState.toggles[s.id])rate-=s.per_second});
    }
    rate=Math.max(0,rate);
    const elapsed=(Date.now()-(window._tickerState?window._tickerState.start:Date.now()))/1000;
    const wasted=rate*elapsed;
    el.textContent='$'+wasted.toFixed(2);
    el.style.color=rate>0?'#FF6B4A':'#2D6A4F';
  },100);
  // Ticker toggle handlers (delegated)
  document.addEventListener('change',function(e){
    if(e.target.classList.contains('sim-toggle')){
      const cid=e.target.dataset.cid;
      if(!window._simState)window._simState={};
      window._simState[cid]=e.target.checked;
      update();
    }
    if(e.target.classList.contains('ticker-toggle')){
      const sid=e.target.dataset.sid;
      if(!window._tickerState)window._tickerState={start:Date.now(),toggles:{},baseRate:0};
      window._tickerState.toggles[sid]=e.target.checked;
      // Re-render to update rates display
      update();
    }
  });

  const runBtn=document.getElementById('runBtn');
  if(runBtn) runBtn.onclick=startCheck;
  const backBtn=document.getElementById('backBtn');
  if(backBtn) backBtn.onclick=()=>{state.view='dashboard';state.section=null;render()};
  const navHome=document.getElementById('navHome');
  if(navHome) navHome.onclick=()=>{state.view='dashboard';state.section=null;render()};
  const exportBtn=document.getElementById('exportBtn');
  if(exportBtn) exportBtn.onclick=()=>window.open('/api/health-check/export-pdf','_blank');
  const checklistBtn=document.getElementById('checklistBtn');
  if(checklistBtn) checklistBtn.onclick=()=>window.open('/api/health-check/export-checklist','_blank');
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.onclick=()=>{
      const sid=el.dataset.section;
      const sec=(state.results?.sections||[]).find(s=>s.section_id===sid);
      if(sec?.active){state.section=sid;state.view='section';render()}
    };
  });
  document.querySelectorAll('.section-card').forEach(el=>{
    el.onclick=()=>{
      const sid=el.dataset.sid;
      const sec=(state.results?.sections||[]).find(s=>s.section_id===sid);
      if(sec?.active){state.section=sid;state.view='section';render()}
    };
  });
  const adoptLink=document.getElementById('viewAllAdoption');
  if(adoptLink){adoptLink.onclick=e=>{e.preventDefault();state.section='adoption';state.view='section';render()};}
  document.querySelectorAll('.check-row').forEach(el=>{
    el.onclick=()=>{
      const det=el.querySelector('.check-detail');
      if(det) det.style.display=det.style.display==='none'?'block':'none';
    };
  });
}

// ── API ──
async function loadWarehouses(){
  const sel=document.getElementById('whSelect');
  if(!sel)return;
  sel.innerHTML='<option>Loading warehouses...</option>';
  try{
    const r=await fetch('/api/warehouses');
    const data=await r.json();
    if(data.error){
      sel.innerHTML=`<option>Error: ${esc(data.error).substring(0,80)}</option>`;
      state.error='Warehouse listing failed: '+data.error;
      render();return;
    }
    if(Array.isArray(data)&&data.length>0){
      const serverless=data.filter(w=>w.enable_serverless_compute);
      const list=serverless.length>0?serverless:data;
      sel.innerHTML=list.map(w=>`<option value="${w.id}">${esc(w.name)} (${w.cluster_size}) \u2014 ${w.enable_serverless_compute?'Serverless':w.warehouse_type} \u2014 ${w.state}</option>`).join('');
    } else {
      sel.innerHTML='<option>No warehouses available</option>';
    }
  }catch(e){
    sel.innerHTML=`<option>Error: ${esc(e.message)}</option>`;
  }
}

async function startCheck(){
  const sel=document.getElementById('whSelect');
  if(!sel||!sel.value)return;
  state.error=null;state.view='running';
  state.runState={idx:0,total:12,name:'Initializing...',completed:{}};
  render();
  try{
    const res=await fetch('/api/health-check/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({warehouse_id:sel.value,include_table_analysis:true})});
    if(!res.ok){const e=await res.json();if(res.status===409){
        // Auto-reset stuck run
        await fetch('/api/health-check/reset',{method:'POST'});
        // Retry
        const res2=await fetch('/api/health-check/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({warehouse_id:sel.value,include_table_analysis:true})});
        if(!res2.ok){const e2=await res2.json();throw new Error(e2.error||'Failed after reset');}
      } else {
        throw new Error(e.error||'Failed to start');
      }}
  }catch(e){state.error=e.message;state.view='setup';render();loadWarehouses();return;}

  let sseActive=true;let es;
  function connectSSE(){
    es=new EventSource('/api/health-check/stream');
    es.onmessage=(ev)=>{
      const d=JSON.parse(ev.data);
      if(d.type==='progress'){
        state.runState.idx=d.completed||state.runState.idx;
        state.runState.total=d.total_sections||state.runState.total;
        state.runState.name=d.section_name||state.runState.name;
        render();
      } else if(d.type==='section_complete'){
        state.runState.completed[d.section]={score:d.score,active:d.active,name:d.section_name};
        state.runState.idx=d.completed||state.runState.idx;
        render();
      } else if(d.type==='complete'||d.type==='done'){
        sseActive=false;es.close();
      } else if(d.type==='error'){
        sseActive=false;es.close();
        state.error=d.message;state.view='setup';render();loadWarehouses();
      }
    };
    es.onerror=()=>{es.close();sseActive=false;};
  }
  connectSSE();

  async function pollResults(){
    const maxWait=900000;const start=Date.now();
    while(Date.now()-start<maxWait){
      await new Promise(r=>setTimeout(r,3000));
      try{
        const r=await fetch('/api/health-check/results');
        if(r.status===202){state.runState.name=state.runState.name||'Processing...';render();continue;}
        if(r.status===500){const e=await r.json();state.error=e.error||'Failed';state.view='setup';render();loadWarehouses();return;}
        if(r.ok){
          const data=await r.json();
          if(data.sections&&data.sections.length>0){
            if(es&&sseActive){es.close();}
            state.results=data;state.view='dashboard';render();return;
          }
        }
      }catch(e){}
    }
    state.error='Health check timed out.';state.view='setup';render();loadWarehouses();
  }
  pollResults();
}

render();
loadWarehouses();
</script>
