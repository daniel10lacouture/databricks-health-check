<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Databricks Account Health Check</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#FF3621;--dark:#1B3139;--white:#FFF;--surface:#F5F7FA;--text:#1B1F23;--text2:#6B7280;--text3:#9CA3AF;--border:#E5E7EB;--excellent:#059669;--good:#2563EB;--warn:#D97706;--crit:#DC2626}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--surface);color:var(--text)}
.btn{border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.card{background:var(--white);border-radius:8px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.08)}
select{font-family:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease-out}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.skeleton{background:var(--surface);border-radius:4px;animation:pulse 1.5s infinite}
.detail-table{width:100%;border-collapse:collapse;font-size:11px}
.detail-table th{text-align:left;padding:5px 8px;font-weight:600;color:#374151;border-bottom:2px solid #E5E7EB;background:#F9FAFB;position:sticky;top:0}
.detail-table td{padding:4px 8px;color:#4B5563;border-bottom:1px solid #F3F4F6;word-break:break-word;max-width:300px}
.detail-table tr:hover td{background:#F0F4FF}
.check-row{transition:all .15s}
.check-row:hover{border-color:#93C5FD;box-shadow:0 2px 8px rgba(37,99,235,.12)}
.check-detail{border-top:1px solid #F3F4F6;margin-top:10px;padding-top:10px}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
let state = { view:'setup', results:null, section:null, runState:{idx:0,total:12,name:'',completed:{}}, error:null };

const SECTIONS=[
{id:'data_engineering',name:'Data Engineering & Table Health',icon:'\u{1F4CA}',type:'core'},
{id:'sql_analytics',name:'Data Warehousing / SQL Analytics',icon:'\u{1F4C8}',type:'core'},
{id:'compute',name:'Compute Management',icon:'\u2699\uFE0F',type:'core'},
{id:'cost_optimization',name:'Cost Optimization',icon:'\u{1F4B0}',type:'core'},
{id:'security',name:'Security & Compliance',icon:'\u{1F6E1}\uFE0F',type:'core'},
{id:'governance',name:'Governance (Unity Catalog)',icon:'\u{1F512}',type:'core'},
{id:'ai_ml',name:'AI & ML Workloads',icon:'\u{1F9E0}',type:'conditional'},
{id:'bi_tooling',name:'BI & Tooling Adoption',icon:'\u{1F4CA}',type:'advisory'},
{id:'apps',name:'Databricks Apps',icon:'\u{1F4F1}',type:'conditional'},
{id:'lakebase',name:'OLTP / Lakebase',icon:'\u{1F5A5}\uFE0F',type:'conditional'},
{id:'delta_sharing',name:'Delta Sharing',icon:'\u{1F517}',type:'conditional'},
{id:'workspace_admin',name:'Workspace Administration',icon:'\u{1F527}',type:'core'},
{id:'adoption',name:'Platform Adoption',icon:'\u{1F680}',type:'advisory'}
];

function scoreColor(s){return s>=90?'#059669':s>=70?'#2563EB':s>=50?'#D97706':'#DC2626'}
function scoreLabel(s){return s>=90?'Excellent':s>=70?'Good':s>=50?'Needs Attention':'Critical'}
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

function render(){
  const root=document.getElementById('root');
  if(state.view==='setup') root.innerHTML=renderSetup();
  else if(state.view==='running') root.innerHTML=renderRunning();
  else if(state.view==='dashboard') root.innerHTML=renderApp(renderDashboard());
  else if(state.view==='section') root.innerHTML=renderApp(renderSection());
  bindEvents();
}

function renderSetup(){
  return `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px;background:linear-gradient(135deg,#F5F7FA,#FFF)">
  <div style="max-width:520px;width:100%">
    <div style="text-align:center;margin-bottom:40px">
      <div style="width:64px;height:64px;border-radius:16px;background:#FF3621;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:28px"><svg width="24" height="24" viewBox="33 0 28.2 30.5" xmlns="http://www.w3.org/2000/svg"><path d="M59.7279 12.5153L47.2039 19.6185L33.8814 12.0502L33.251 12.3884V17.885L47.2039 25.8339L59.7279 18.7306V21.648L47.2039 28.7513L33.8814 21.1829L33.251 21.5212V22.4514L47.2039 30.4002L61.1989 22.4514V16.9548L60.5685 16.6165L47.2039 24.1849L34.7219 17.0816V14.2065L47.2039 21.2675L61.1989 13.3186V7.9066L60.4844 7.52607L47.2039 15.0521L35.3943 8.32941L47.2039 1.64897L56.9541 7.14554L57.8367 6.68044V6.00394L47.2039 0L33.251 7.9066V8.75223L47.2039 16.7011L59.7279 9.59785V12.5153Z" fill="white"/></svg></div>
      <h1 style="font-size:28px;font-weight:700;margin:0 0 8px">Account Health Check</h1>
      <p style="font-size:15px;color:#6B7280;line-height:1.5">Comprehensive analysis across 12 categories with actionable drill-downs.</p>
    </div>
    <div class="card" style="padding:32px">
      <label style="font-size:13px;font-weight:600;margin-bottom:8px;display:block">SQL Warehouse</label>
      <select id="whSelect" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #E5E7EB;font-size:14px;background:white">
        <option>Loading warehouses...</option>
      </select>
      ${state.error?`<div style="margin-top:12px;padding:10px;border-radius:8px;background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;font-size:13px">${esc(state.error)}</div>`:''}
      <button id="runBtn" class="btn" style="width:100%;margin-top:20px;padding:14px;border-radius:8px;font-size:15px;font-weight:600;background:#FF3621;color:white">Run Health Check</button>
      <p style="margin-top:10px;font-size:12px;color:#9CA3AF;text-align:center">Typical run: 2\u20135 minutes</p>
    </div>
  </div></div>`;
}

function renderRunning(){
  const rs=state.runState;
  const pct=rs.total?Math.round((rs.idx/rs.total)*100):0;
  let cards='';
  SECTIONS.forEach(s=>{
    const c=rs.completed[s.id];
    const scoreHtml=c?`<div class="fade-in" style="margin-top:6px;font-size:22px;font-weight:700;color:${c.active?scoreColor(c.score):'#9CA3AF'}">${c.active?Math.round(c.score):'N/A'}</div>`
      :`<div class="skeleton" style="margin-top:6px;height:22px;width:40px"></div>`;
    cards+=`<div class="card" style="padding:16px;opacity:${c?1:0.45};transition:all .3s"><div style="font-size:13px;font-weight:600">${s.icon} ${esc(s.name)}</div>${scoreHtml}</div>`;
  });
  return `<div style="padding:32px">
    <div style="height:4px;background:#E5E7EB;border-radius:2px;overflow:hidden;margin-bottom:12px"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#FF3621,#FF6B4A);border-radius:2px;transition:width .5s ease"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;color:#6B7280"><span>Completed ${rs.idx} of ${rs.total} sections <strong style="color:#1B1F23">${rs.name?' — '+esc(rs.name):''}</strong></span><span>${pct}%</span></div>
    <div style="margin-top:40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">${cards}</div>
  </div>`;
}

function renderApp(content){
  const r=state.results;const ov=r?.overall;
  let sideItems='';
  SECTIONS.forEach(s=>{
    const sec=(r?.sections||[]).find(x=>x.section_id===s.id);
    const isSel=state.section===s.id;
    const badge=sec?.active&&sec?.score!=null?`<span style="font-size:11px;font-weight:600;padding:1px 6px;border-radius:8px;background:${scoreColor(sec.score)};color:white">${Math.round(sec.score)}</span>`:`<span style="font-size:10px;opacity:0.3">N/A</span>`;
    sideItems+=`<div class="sidebar-item" data-section="${s.id}" style="padding:8px 14px;cursor:${sec?.active?'pointer':'default'};display:flex;align-items:center;gap:10px;background:${isSel?'rgba(255,255,255,0.1)':'transparent'};border-left:3px solid ${isSel?'#FF3621':'transparent'};transition:all .15s">
      <span style="font-size:14px">${s.icon}</span>
      <div style="flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.name)}</div>
      ${badge}
    </div>`;
  });
  return `<div style="display:flex;height:100vh">
    <nav style="width:260px;min-width:260px;background:#1B3139;color:white;display:flex;flex-direction:column;overflow:hidden">
      <div id="navHome" style="padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer">
        <div style="display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:6px;background:#FF3621;display:flex;align-items:center;justify-content:center"><svg width="14" height="14" viewBox="33 0 28.2 30.5" xmlns="http://www.w3.org/2000/svg"><path d="M59.7279 12.5153L47.2039 19.6185L33.8814 12.0502L33.251 12.3884V17.885L47.2039 25.8339L59.7279 18.7306V21.648L47.2039 28.7513L33.8814 21.1829L33.251 21.5212V22.4514L47.2039 30.4002L61.1989 22.4514V16.9548L60.5685 16.6165L47.2039 24.1849L34.7219 17.0816V14.2065L47.2039 21.2675L61.1989 13.3186V7.9066L60.4844 7.52607L47.2039 15.0521L35.3943 8.32941L47.2039 1.64897L56.9541 7.14554L57.8367 6.68044V6.00394L47.2039 0L33.251 7.9066V8.75223L47.2039 16.7011L59.7279 9.59785V12.5153Z" fill="white"/></svg></div><div><div style="font-size:13px;font-weight:600">Health Check</div><div style="font-size:10px;opacity:0.5">Account Diagnostics</div></div></div>
        ${ov?.overall_score!=null?`<div style="margin-top:12px;display:flex;align-items:center;gap:10px">${renderGaugeSVG(ov.overall_score||0,48,false)}<div><div style="font-size:11px;opacity:0.5">Overall</div><div style="font-size:16px;font-weight:600;color:${scoreColor(ov.overall_score)}">${Math.round(ov.overall_score)}</div></div></div>`:''}
      </div>
      <div style="flex:1;overflow-y:auto;padding:6px 0">${sideItems}</div>
      <div style="padding:12px;border-top:1px solid rgba(255,255,255,0.1);font-size:10px;opacity:0.3">${r?.timestamp?'Last run: '+new Date(r.timestamp).toLocaleString():'Databricks Health Check'}</div>
    </nav>
    <div style="flex:1;overflow:auto">${content}</div>
  </div>`;
}

function renderGaugeSVG(score,size,showLabel){
  const s=Math.max(0,Math.min(100,Math.round(score||0)));
  const sw=size>=120?6:size>=80?5:3;
  const r=(size/2)-sw-2;
  const circ=2*Math.PI*r;
  const arcLen=circ*0.75;
  const gapLen=circ*0.25;
  const filled=(s/100)*arcLen;
  const offset=arcLen-filled;
  const fs=size<55?13:size<80?18:size<110?24:34;
  const c=scoreColor(s);
  const lbl=showLabel?'<text x="'+size/2+'" y="'+(size/2+fs*0.55)+'" text-anchor="middle" style="font-size:'+Math.max(9,fs*0.38)+'px;fill:'+c+';font-weight:500;font-family:Inter,sans-serif">'+scoreLabel(s)+'</text>':'';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    +'<g transform="rotate(135,'+size/2+','+size/2+')">'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#E5E7EB" stroke-width="'+sw+'" stroke-dasharray="'+arcLen+' '+gapLen+'" stroke-linecap="round"/>'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="'+sw+'" stroke-dasharray="'+arcLen+' '+gapLen+'" stroke-dashoffset="'+offset+'" stroke-linecap="round" style="transition:stroke-dashoffset .8s ease"/>'
    +'</g>'
    +'<text x="'+size/2+'" y="'+(size/2-(showLabel?fs*0.12:0))+'" text-anchor="middle" dominant-baseline="central" style="font-size:'+fs+'px;font-weight:700;fill:'+c+';font-family:Inter,sans-serif">'+s+'</text>'
    +lbl
    +'</svg>';
}


function renderInsightsPanel(){
  const r=state.results;if(!r)return'';
  const ins=r.insights||{};const ai=r.ai_insights||{};const ov=r.overall||{};
  const ml=ov.maturity_level||ins.maturity?.level||0;
  const mlabel=ov.maturity_label||ins.maturity?.label||'';
  const mdesc=ins.maturity?.description||'';
  if(!ml&&!Object.keys(ins).length&&!ai.executive_summary)return'';

  const mColors={1:'#DC2626',2:'#D97706',3:'#2563EB',4:'#059669',5:'#7C3AED'};
  const mc=mColors[ml]||'#9CA3AF';
  let h='';

  /* Maturity + Anomalies row */
  h+='<div style="display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap">';
  if(ml>0){
    h+=`<div class="card" style="flex:1 1 280px;padding:20px;display:flex;align-items:center;gap:18px">
      <div style="width:58px;height:58px;border-radius:14px;background:${mc}12;display:flex;align-items:center;justify-content:center;border:2px solid ${mc};flex-shrink:0">
        <span style="font-size:26px;font-weight:800;color:${mc}">${ml}</span>
      </div>
      <div>
        <div style="font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.8px;font-weight:600">Maturity Level</div>
        <div style="font-size:18px;font-weight:700">${esc(mlabel)}</div>
        ${mdesc?`<div style="font-size:12px;color:#6B7280;margin-top:2px">${esc(mdesc)}</div>`:''}
      </div>
    </div>`;
  }
  const anomalies=ins.anomalies||[];
  if(anomalies.length>0){
    h+='<div style="flex:1 1 280px;display:flex;flex-direction:column;gap:6px">';
    anomalies.forEach(a=>{
      const bg=a.severity==='high'?'#FEF2F2':'#FFFBEB';
      const bc=a.severity==='high'?'#FECACA':'#FDE68A';
      const ic=a.severity==='high'?'#DC2626':'#D97706';
      h+=`<div style="background:${bg};border-radius:8px;padding:10px 14px;border:1px solid ${bc};display:flex;align-items:flex-start;gap:8px">
        <span style="color:${ic};flex-shrink:0">\u26A0</span>
        <div><div style="font-size:13px;font-weight:600">${esc(a.title)}</div><div style="font-size:12px;color:#6B7280">${esc(a.message)}</div></div>
      </div>`;
    });
    h+='</div>';
  }
  h+='</div>';

  /* Trends row */
  const trends=ins.trends||{};const tkeys=Object.keys(trends);
  if(tkeys.length>0){
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px">';
    tkeys.forEach(k=>{
      const t=trends[k];const d=t.data||[];const last=d.length?d[d.length-1]:null;
      let val='\u2014';
      if(last){
        if(last.value!=null)val=last.value.toLocaleString()+' '+t.unit;
        else if(last.p95_sec!=null)val=last.p95_sec+'s P95';
        else if(last.failure_rate!=null)val=last.failure_rate+'%';
      }
      const arrows={increasing:'\u2191 Trending up',decreasing:'\u2193 Trending down',stable:'\u2192 Stable',insufficient_data:'\u2014 Limited data'};
      const tColor=t.direction==='decreasing'?'#059669':t.direction==='increasing'?(k==='cost'||k==='job_failures'?'#DC2626':'#059669'):'#9CA3AF';
      h+=`<div class="card" style="padding:12px 14px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;font-weight:600">${esc(t.label)}</span>
        </div>
        <div style="font-size:17px;font-weight:700;margin-top:3px">${esc(val)}</div>
        <div style="font-size:11px;color:${tColor};font-weight:500;margin-top:2px">${arrows[t.direction]||''} <span style="color:#9CA3AF">(12 wks)</span></div>
      </div>`;
    });
    h+='</div>';
  }

  /* What-if scenarios */
  const whatif=ins.whatif_scenarios||[];
  if(whatif.length>0){
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:14px">';
    whatif.forEach(s=>{
      h+=`<div style="background:#F0FDF4;border-radius:8px;padding:14px;border:1px solid #BBF7D0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="color:#059669">\uD83D\uDCB0</span><span style="font-size:13px;font-weight:600;color:#065F46">${esc(s.title)}</span></div>
        <div style="font-size:12px;color:#047857;margin-bottom:4px">${esc(s.description)}</div>
        <div style="font-size:11px"><span style="color:#059669;font-weight:600">${esc(s.estimated_savings)}</span> <span style="color:#6B7280">\u00B7 Effort: ${esc(s.effort)}</span></div>
      </div>`;
    });
    h+='</div>';
  }

  /* AI Insights (collapsible) */
  if(ai.executive_summary&&!ai.error){
    h+=`<div class="card" style="overflow:hidden;margin-bottom:14px">
      <div id="aiToggle" style="padding:14px 18px;background:linear-gradient(135deg,#F5F3FF,#EEF2FF);cursor:pointer;display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px">\u2728</span>
          <span style="font-size:14px;font-weight:600;color:#4C1D95">AI-Powered Insights</span>
          <span style="font-size:11px;color:#6D28D9;background:#EDE9FE;padding:2px 8px;border-radius:10px;font-weight:500">${esc(ai.model||'GenAI')}</span>
        </div>
        <span id="aiChevron" style="color:#6D28D9;font-size:14px">\u25BC</span>
      </div>
      <div id="aiBody" style="display:none;padding:20px">
        <div style="margin-bottom:18px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">\uD83E\uDDE0 Executive Summary</div><div style="font-size:13px;line-height:1.7;color:#6B7280;white-space:pre-wrap">${esc(ai.executive_summary)}</div></div>
        ${(ai.cross_section_insights||[]).length?'<div style="margin-bottom:18px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">\u26A1 Cross-Section Correlations</div>'+(ai.cross_section_insights||[]).map(c=>`<div style="padding:8px 12px;background:#FAFAFE;border:1px solid #E9E5FF;border-radius:6px;margin-bottom:6px;font-size:12px;color:#6B7280"><span style="font-weight:600;color:#4C1D95">${esc((c.sections||[]).join(' \u2194 '))}: </span>${esc(c.insight)}</div>`).join('')+'</div>':''}
        ${(ai.action_plan||[]).length?'<div style="margin-bottom:18px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">\u27A1 Prioritized Action Plan</div>'+(ai.action_plan||[]).map((s,i)=>`<div style="display:flex;gap:10px;padding:8px 0;${i<(ai.action_plan||[]).length-1?'border-bottom:1px solid #F3F4F6':''}"><div style="width:22px;height:22px;border-radius:50%;background:#EDE9FE;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6D28D9;flex-shrink:0">${s.priority}</div><div><div style="font-size:13px;font-weight:500">${esc(s.action)}</div><div style="font-size:11px;color:#6B7280;margin-top:2px">Impact: ${esc(s.impact)} \u00B7 Effort: ${esc(s.effort)}</div></div></div>`).join('')+'</div>':''}
        ${ai.whatif_narrative?`<div style="padding:12px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;font-size:13px;line-height:1.6;color:#065F46"><span style="font-weight:600">\uD83D\uDEE1 What-If Projection:</span> ${esc(ai.whatif_narrative)}</div>`:''}
      </div>
    </div>`;
  }
  return h;
}

function renderScoreBooster(){
  const r=state.results;if(!r||!r.score_booster||!r.score_booster.available)return'';
  const sb=r.score_booster;
  if(sb.total_boost<=0)return'';
  const cur=sb.current_score;const pot=sb.potential_score;const boost=sb.total_boost;
  const opps=sb.top_opportunities||[];
  const curPct=Math.min(cur,100);const potPct=Math.min(pot,100);

  let oppCards='';
  opps.slice(0,3).forEach(opp=>{
    const rec=opp.recommendation||{};
    const docLink=rec.docs_url?`<a href="${esc(rec.docs_url)}" target="_blank" style="font-size:11px;color:#2563EB;margin-top:6px;display:inline-block">Get started \u2197</a>`:'';
    oppCards+=`<div class="card" style="padding:14px;flex:1;min-width:220px;border-top:3px solid #059669">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">${esc(opp.name)}</span>
        <span style="font-size:12px;font-weight:700;color:#059669;background:#ECFDF5;padding:2px 8px;border-radius:10px">+${opp.projected_boost} pts</span>
      </div>
      <div style="font-size:12px;color:#6B7280;margin-bottom:4px">${esc(opp.current_value||'')}</div>
      <div style="font-size:11px;color:#9CA3AF;font-style:italic;margin-bottom:4px">${esc(opp.peer_benchmark||'')}</div>
      ${docLink}
    </div>`;
  });

  const moreCount=sb.opportunity_count-3;

  return `<div class="card" style="padding:24px;margin-top:24px;background:linear-gradient(135deg,#F0FDF4 0%,#ECFDF5 40%,#F5F7FA 100%);border:1px solid #BBF7D0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">

        <div style="font-size:16px;font-weight:700;color:#166534">\u{1F680} Score Booster</div>
        <div style="font-size:13px;color:#6B7280;margin-top:2px">Adopt these capabilities to unlock <strong>+${boost} points</strong></div>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#374151">${cur}</div><div style="font-size:11px;color:#9CA3AF">Current</div></div>
        <div style="font-size:18px;color:#9CA3AF">\u2192</div>
        <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#059669">${pot}</div><div style="font-size:11px;color:#059669">Potential</div></div>
      </div>
    </div>
    <div style="margin-bottom:20px;position:relative">
      <div style="height:8px;background:#E5E7EB;border-radius:4px;overflow:visible;position:relative">
        <div style="height:100%;width:${curPct}%;background:#374151;border-radius:4px;position:absolute;z-index:2"></div>
        <div style="height:100%;width:${potPct}%;background:#BBF7D0;border-radius:4px;position:absolute;z-index:1"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">

        <span style="font-size:10px;color:#9CA3AF">100</span>

    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">${oppCards}</div>

}

function renderDashboard(){
  const r=state.results;if(!r)return'';
  const secs=r.sections||[];const active=secs.filter(s=>s.active);const ov=r.overall||{};
  let cards='';
  secs.forEach(sec=>{
    const meta=SECTIONS.find(s=>s.id===sec.section_id)||{icon:'\u2B55',name:sec.section_name};
    const issues=(sec.checks||[]).filter(c=>c.status==='fail'||c.status==='partial').length;
    const isAdoption=sec.section_id==='adoption';
    const adoptionBoost=isAdoption&&state.results&&state.results.score_booster?state.results.score_booster.total_boost:0;
    const scoreHtml=isAdoption&&adoptionBoost>0?`<span class="fade-in" style="font-size:20px;font-weight:700;color:#059669;font-variant-numeric:tabular-nums">+${adoptionBoost} pts</span>`:sec.active&&sec.score!=null?`<span class="fade-in" style="font-size:26px;font-weight:700;color:${scoreColor(sec.score)};font-variant-numeric:tabular-nums">${Math.round(sec.score)}</span>`:`<span style="font-size:12px;color:#9CA3AF">N/A</span>`;
    const bar=sec.active?`<div style="margin-top:14px;height:4px;background:#F5F7FA;border-radius:2px;overflow:hidden"><div style="height:100%;width:${sec.score||0}%;background:${scoreColor(sec.score||0)};border-radius:2px;transition:width .6s ease"></div></div><div style="margin-top:8px;font-size:12px;color:${issues>0?'#D97706':'#059669'}">${issues>0?'\u26A0 '+issues+' check'+(issues>1?'s':'')+' need attention':'\u2705 All checks passing'}</div>`
      :`<div style="margin-top:10px;font-size:12px;color:#9CA3AF">Not Evaluated \u2014 No Significant Usage</div>`;
    cards+=`<div class="card section-card" data-sid="${sec.section_id}" style="padding:18px;cursor:${sec.active?'pointer':'default'};opacity:${sec.active?1:0.5};transition:all .2s">
      <div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:22px">${meta.icon}</span><div><div style="font-size:14px;font-weight:600">${esc(meta.name)}</div><div style="font-size:11px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px">${sec.section_type}</div></div></div>${scoreHtml}</div>${bar}</div>`;
  });
  let recs='';
  (r.top_recommendations||[]).slice(0,5).forEach(rec=>{
    const pc=rec.priority==='high'?'#DC2626':rec.priority==='medium'?'#D97706':'#2563EB';
    recs+=`<div class="card" style="padding:16px;border-left:4px solid ${pc};margin-bottom:8px"><div style="display:flex;justify-content:space-between;gap:12px"><div style="flex:1"><div style="font-size:13px;font-weight:600;margin-bottom:4px">${esc(rec.action||'')}</div><div style="font-size:12px;color:#6B7280">${esc(rec.impact||'')}</div></div><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:${pc}15;color:${pc};text-transform:uppercase;white-space:nowrap">${rec.priority||'medium'}</span></div>${rec.docs_url?`<a href="${esc(rec.docs_url)}" target="_blank" style="font-size:12px;color:#2563EB;margin-top:6px;display:inline-block">Documentation \u2197</a>`:''}</div>`;
  });
  return `<div style="padding:32px;max-width:1200px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:8px"><div><h1 style="font-size:24px;font-weight:700;margin:0">Account Health Dashboard</h1><p style="font-size:13px;color:#6B7280;margin-top:4px">${r.timestamp?new Date(r.timestamp).toLocaleString():''}</p></div><div style="display:flex;gap:8px"><button id="checklistBtn" class="btn card" style="padding:8px 16px;font-size:13px;font-weight:500">\u2611 Export Checklist</button><button id="exportBtn" class="btn card" style="padding:8px 16px;font-size:13px;font-weight:500">\u2B07 Export Report</button></div></div>
    <div class="card" style="padding:28px;display:flex;align-items:center;gap:40px;margin-bottom:28px">${renderGaugeSVG(ov.overall_score||0,140,true)}<div><h2 style="font-size:20px;font-weight:600;margin:0 0 8px">Overall Health Score</h2><div style="display:flex;gap:20px"><div><div style="font-size:22px;font-weight:700">${active.length}</div><div style="font-size:12px;color:#6B7280">Analyzed</div></div><div><div style="font-size:22px;font-weight:700;color:#059669">${active.filter(s=>(s.score||0)>=90).length}</div><div style="font-size:12px;color:#6B7280">Excellent</div></div><div><div style="font-size:22px;font-weight:700;color:#D97706">${active.filter(s=>(s.score||0)>=50&&(s.score||0)<90).length}</div><div style="font-size:12px;color:#6B7280">Needs Work</div></div><div><div style="font-size:22px;font-weight:700;color:#DC2626">${active.filter(s=>(s.score||0)<50).length}</div><div style="font-size:12px;color:#6B7280">Critical</div></div></div></div></div>
    ${renderInsightsPanel()}
    <h3 style="font-size:16px;font-weight:600;margin:0 0 12px">Sections</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:32px">${cards}</div>
    ${recs?`<h3 style="font-size:16px;font-weight:600;margin:0 0 12px">Top Recommendations</h3>${recs}`:''}
    ${renderScoreBooster()}
  </div>`;
}

function renderDetailTable(items){
  if(!items||!items.length)return'';
  if(typeof items[0]!=='object')return'';
  const cols=Object.keys(items[0]);
  const hdr=cols.map(c=>`<th>${esc(c.replace(/_/g,' '))}</th>`).join('');
  const tbody=items.map(r=>`<tr>${cols.map(c=>{
    const v=r[c];
    const s=String(v??'');
    const display=s.length>80?s.substring(0,77)+'...':s;
    return `<td title="${esc(s)}">${esc(display)}</td>`;
  }).join('')}</tr>`).join('');
  return `<div style="max-height:350px;overflow:auto;border:1px solid #E5E7EB;border-radius:6px"><table class="detail-table"><thead><tr>${hdr}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}

/* Universal detail renderer — handles ALL possible detail keys from any check */
function renderAllDetails(det, checkStatus){
  if(!det || typeof det !== 'object' || Object.keys(det).length === 0) {
    if(checkStatus === 'pass') return '<div style="margin-top:8px;padding:10px 14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:6px;font-size:12px;color:#166534"><strong>\u2705 Best practice achieved.</strong> This check meets or exceeds the target. Continue maintaining this standard.</div>';
    return '<div style="margin-top:8px;font-size:12px;color:#9CA3AF">No additional details available.</div>';
  }
  let html='';
  const summary=det.summary||'';
  if(summary) html+=`<div style="margin-top:8px;font-size:12px;color:#6B7280;font-style:italic">${esc(summary)}</div>`;

  // Render all array-type detail keys as tables
  const arrayKeys = Object.keys(det).filter(k => Array.isArray(det[k]) && det[k].length > 0 && typeof det[k][0] === 'object');
  const labelMap = {
    'non_conforming': checkStatus==='pass'?'Details':'Non-conforming resources',
    'classification_summary':'Classification Summary',
    'top_jobs':'Top Jobs','endpoints':'Endpoints','tools':'Tools',
    'external_bi_tools':'External BI Tools','databricks_native':'Databricks Native',
    'active_endpoints':'Active Endpoints','other_tools':'Other Tools',
    'trend':'Trend Data','months':'Monthly Trend'
  };

  arrayKeys.forEach(key=>{
    const items=det[key];
    const label=labelMap[key]||key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const suffix=items.length>=20?' shown, more may exist':'';
    html+=`<div style="margin-top:10px"><div style="font-size:11px;font-weight:600;color:#6B7280;margin-bottom:4px">${label} (${items.length}${suffix})</div>${renderDetailTable(items)}</div>`;
  });

  // Render scalar/object details as key-value pairs
  const peerBenchmark=det.peer_benchmark||'';
  if(peerBenchmark) html+=`<div style="margin-top:8px;padding:10px 14px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;font-size:12px;color:#1E40AF"><strong>\u{1F465} Peer Insight:</strong> ${esc(peerBenchmark)}</div>`;
  const projected=det.projected_score_boost||0;
  if(projected>0) html+=`<div style="margin-top:6px;padding:8px 14px;background:#ECFDF5;border:1px solid #BBF7D0;border-radius:6px;font-size:12px;color:#166534"><strong>\u{1F4C8} Score Impact:</strong> Adopting this could add <strong>+${projected} points</strong> to your overall health score</div>`;
  const scalarKeys = Object.keys(det).filter(k => !Array.isArray(det[k]) && k !== 'summary' && k !== 'peer_benchmark' && k !== 'projected_score_boost' && det[k] !== null && det[k] !== undefined && typeof det[k] !== 'object');
  if(scalarKeys.length > 0 && arrayKeys.length === 0){
    const items = scalarKeys.map(k => ({metric: k.replace(/_/g,' '), value: det[k]}));
    html+=`<div style="margin-top:10px">${renderDetailTable(items)}</div>`;
  }

  if(!html) html='<div style="margin-top:8px;font-size:12px;color:#9CA3AF">No additional details available.</div>';
  return html;
}

function renderSection(){
  const r=state.results;if(!r||!state.section)return'';
  const sec=(r.sections||[]).find(s=>s.section_id===state.section);if(!sec)return'';
  const checks=sec.checks||[];
  const scored=checks.filter(c=>c.status!=='not_evaluated');
  const grouped={};
  checks.forEach(c=>{const s=c.subsection||'General';if(!grouped[s])grouped[s]=[];grouped[s].push(c)});
  let groups='';
  Object.entries(grouped).forEach(([sub,chks])=>{
    let rows='';
    chks.forEach(c=>{
      const icon=c.status==='pass'?'\u2705':c.status==='partial'?'\u26A0\uFE0F':c.status==='fail'?'\u274C':c.status==='info'?'\u2139\uFE0F':'\u2796';
      const sc=c.status==='info'?'INFO':c.status==='not_evaluated'?'N/A':c.score;
      const scColor=c.score===100?'#059669':c.score===50?'#D97706':c.status==='info'?'#6B7280':'#DC2626';
      // Info badge explanation
      const infoBadge=c.status==='info'?'<span style="font-size:10px;color:#6B7280;background:#F3F4F6;padding:1px 6px;border-radius:4px;margin-left:6px" title="Informational metric — not scored, click for details">Informational</span>':'';
      // Recommendation
      let recHtml='';
      if(c.recommendation){
        const rc=c.recommendation;
        const pc=rc.priority==='high'?'#DC2626':rc.priority==='medium'?'#D97706':'#2563EB';
        recHtml=`<div style="padding:12px;border-left:3px solid ${pc};background:#F9FAFB;border-radius:4px;margin-bottom:8px"><div style="font-size:12px;font-weight:600;margin-bottom:4px">${esc(rc.action||'')}</div><div style="font-size:11px;color:#6B7280">${esc(rc.impact||'')}</div>${rc.estimated_savings?`<div style="font-size:11px;color:#059669;margin-top:2px">\u{1F4B0} ${esc(rc.estimated_savings)}</div>`:''}${rc.docs_url?`<a href="${esc(rc.docs_url)}" target="_blank" style="font-size:11px;color:#2563EB;margin-top:4px;display:inline-block">Documentation \u2197</a>`:''}${rc.sql_command?`<div style="margin-top:4px;font-size:10px;font-family:monospace;background:#F3F4F6;padding:4px 8px;border-radius:4px">${esc(rc.sql_command)}</div>`:''}</div>`;
      }
      // Details — universal renderer for ALL checks
      const detailsHtml = renderAllDetails(c.details||{}, c.status);

      rows+=`<div class="card check-row" style="padding:14px;margin-bottom:6px;cursor:pointer"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:16px">${icon}</span><div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(c.name)}${infoBadge}</div><div style="font-size:12px;color:#6B7280;margin-top:2px">${esc(c.current_value)} \u00B7 Target: ${esc(c.target_value)}</div></div><div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:#9CA3AF">\u25BC</span><span style="font-size:14px;font-weight:700;color:${scColor};font-variant-numeric:tabular-nums">${sc}</span></div></div><div class="check-detail" style="display:none">${recHtml}${detailsHtml}</div></div>`;
    });
    groups+=`<div style="margin-bottom:24px"><h2 style="font-size:15px;font-weight:600;margin:0 0 10px;padding-bottom:8px;border-bottom:2px solid #E5E7EB">${esc(sub)}</h2>${rows}</div>`;
  });
  return `<div style="padding:32px;max-width:960px;margin:0 auto">
    <button id="backBtn" class="btn" style="background:none;font-size:13px;color:#6B7280;padding:6px 0;margin-bottom:20px">\u2190 Back to Dashboard</button>
    <div class="card" style="padding:24px;display:flex;align-items:center;gap:28px;margin-bottom:24px">${renderGaugeSVG(sec.score||0,100,false)}<div><h1 style="font-size:22px;font-weight:700;margin:0 0 4px">${esc(sec.section_name||sec.name||'')}</h1><div style="display:flex;gap:14px;margin-top:8px"><span style="font-size:13px;color:#6B7280">\u{1F7E2} <strong style="color:#059669">${scored.filter(c=>c.score===100).length}</strong> Pass</span><span style="font-size:13px;color:#6B7280">\u{1F7E1} <strong style="color:#D97706">${scored.filter(c=>c.score===50).length}</strong> Partial</span><span style="font-size:13px;color:#6B7280">\u{1F534} <strong style="color:#DC2626">${scored.filter(c=>c.score===0&&c.status==='fail').length}</strong> Fail</span><span style="font-size:13px;color:#6B7280">\u2139\uFE0F <strong style="color:#6B7280">${checks.filter(c=>c.status==='info').length}</strong> Info</span></div></div></div>
    ${groups}
  </div>`;
}

// ── Events ──
function bindEvents(){
  const runBtn=document.getElementById('runBtn');
  if(runBtn) runBtn.onclick=startCheck;
  const backBtn=document.getElementById('backBtn');
  if(backBtn) backBtn.onclick=()=>{state.view='dashboard';state.section=null;render()};
  const navHome=document.getElementById('navHome');
  if(navHome) navHome.onclick=()=>{state.view='dashboard';state.section=null;render()};
  const exportBtn=document.getElementById('exportBtn');
  if(exportBtn) exportBtn.onclick=()=>window.open('/api/health-check/export-pdf','_blank');
  const checklistBtn=document.getElementById('checklistBtn');
  if(checklistBtn) checklistBtn.onclick=()=>window.open('/api/health-check/export-checklist','_blank');
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.onclick=()=>{
      const sid=el.dataset.section;
      const sec=(state.results?.sections||[]).find(s=>s.section_id===sid);
      if(sec?.active){state.section=sid;state.view='section';render()}
    };
  });
  document.querySelectorAll('.section-card').forEach(el=>{
    el.onclick=()=>{
      const sid=el.dataset.sid;
      const sec=(state.results?.sections||[]).find(s=>s.section_id===sid);
      if(sec?.active){state.section=sid;state.view='section';render()}
    };
  });
  const adoptLink=document.getElementById('viewAllAdoption');
  if(adoptLink){adoptLink.onclick=e=>{e.preventDefault();state.section='adoption';state.view='section';render()};}
  document.querySelectorAll('.check-row').forEach(el=>{
    el.onclick=()=>{
      const det=el.querySelector('.check-detail');
      if(det) det.style.display=det.style.display==='none'?'block':'none';
    };
  });
}

// ── API ──
async function loadWarehouses(){
  const sel=document.getElementById('whSelect');
  if(!sel)return;
  sel.innerHTML='<option>Loading warehouses...</option>';
  try{
    const r=await fetch('/api/warehouses');
    const data=await r.json();
    if(data.error){
      sel.innerHTML=`<option>Error: ${esc(data.error).substring(0,80)}</option>`;
      state.error='Warehouse listing failed: '+data.error;
      render();return;
    }
    if(Array.isArray(data)&&data.length>0){
      const serverless=data.filter(w=>w.enable_serverless_compute);
      const list=serverless.length>0?serverless:data;
      sel.innerHTML=list.map(w=>`<option value="${w.id}">${esc(w.name)} (${w.cluster_size}) \u2014 ${w.enable_serverless_compute?'Serverless':w.warehouse_type} \u2014 ${w.state}</option>`).join('');
    } else {
      sel.innerHTML='<option>No warehouses available</option>';
    }
  }catch(e){
    sel.innerHTML=`<option>Error: ${esc(e.message)}</option>`;
  }
}

async function startCheck(){
  const sel=document.getElementById('whSelect');
  if(!sel||!sel.value)return;
  state.error=null;state.view='running';
  state.runState={idx:0,total:12,name:'Initializing...',completed:{}};
  render();
  try{
    const res=await fetch('/api/health-check/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({warehouse_id:sel.value,include_table_analysis:true})});
    if(!res.ok){const e=await res.json();if(res.status===409){
        // Auto-reset stuck run
        await fetch('/api/health-check/reset',{method:'POST'});
        // Retry
        const res2=await fetch('/api/health-check/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({warehouse_id:sel.value,include_table_analysis:true})});
        if(!res2.ok){const e2=await res2.json();throw new Error(e2.error||'Failed after reset');}
      } else {
        throw new Error(e.error||'Failed to start');
      }}
  }catch(e){state.error=e.message;state.view='setup';render();loadWarehouses();return;}

  let sseActive=true;let es;
  function connectSSE(){
    es=new EventSource('/api/health-check/stream');
    es.onmessage=(ev)=>{
      const d=JSON.parse(ev.data);
      if(d.type==='progress'){
        state.runState.idx=d.completed||state.runState.idx;
        state.runState.total=d.total_sections||state.runState.total;
        state.runState.name=d.section_name||state.runState.name;
        render();
      } else if(d.type==='section_complete'){
        state.runState.completed[d.section]={score:d.score,active:d.active,name:d.section_name};
        state.runState.idx=d.completed||state.runState.idx;
        render();
      } else if(d.type==='complete'||d.type==='done'){
        sseActive=false;es.close();
      } else if(d.type==='error'){
        sseActive=false;es.close();
        state.error=d.message;state.view='setup';render();loadWarehouses();
      }
    };
    es.onerror=()=>{es.close();sseActive=false;};
  }
  connectSSE();

  async function pollResults(){
    const maxWait=900000;const start=Date.now();
    while(Date.now()-start<maxWait){
      await new Promise(r=>setTimeout(r,3000));
      try{
        const r=await fetch('/api/health-check/results');
        if(r.status===202){state.runState.name=state.runState.name||'Processing...';render();continue;}
        if(r.status===500){const e=await r.json();state.error=e.error||'Failed';state.view='setup';render();loadWarehouses();return;}
        if(r.ok){
          const data=await r.json();
          if(data.sections&&data.sections.length>0){
            if(es&&sseActive){es.close();}
            state.results=data;state.view='dashboard';render();return;
          }
        }
      }catch(e){}
    }
    state.error='Health check timed out.';state.view='setup';render();loadWarehouses();
  }
  pollResults();
}

render();
loadWarehouses();
