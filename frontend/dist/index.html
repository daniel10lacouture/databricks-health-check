function scoreColor(s){return s>=90?'#1B3139':s>=70?'#374151':s>=50?'#6B7280':'#9CA3AF'}
function scoreLabel(s){return s>=90?'Excellent':s>=70?'Good':s>=50?'Needs Attention':'Critical'}
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

function render(){
  const root=document.getElementById('root');
  const prevView=root.dataset.view||'';
  const newView=state.view;
  
  function doRender(){
    if(newView==='setup') root.innerHTML=renderSetup();
    else if(newView==='running') root.innerHTML=renderRunning();
    else if(newView==='dashboard'){
      root.innerHTML=renderApp(renderDashboard());
      // Score reveal animation
      if(prevView==='running'||!root.dataset.revealed){
        root.dataset.revealed='1';
        animateScoreReveal();
        saveToHistory();
      }
    }
    else if(newView==='wrapped') root.innerHTML=renderWrapped();
    else if(newView==='quickfixes') root.innerHTML=renderApp(renderQuickFixes());
    else if(newView==='section') root.innerHTML=renderApp(renderSection());
    root.dataset.view=newView;
    bindEvents();
  }
  
  // Smooth fade transition between major views
  if(prevView&&prevView!==newView&&(prevView==='running'||newView==='running'||prevView==='setup')){
    root.classList.add('fading');
    setTimeout(()=>{doRender();root.classList.remove('fading')},200);
  } else {
    doRender();
  }
}

function animateScoreReveal(){
  const ov=state.results&&state.results.overall;
  if(!ov||!ov.overall_score)return;
  const target=Math.round(ov.overall_score);
  const els=document.querySelectorAll('svg text');
  let scoreEl=null;
  els.forEach(el=>{if(el.textContent==String(target)&&el.style.fontSize&&parseInt(el.style.fontSize)>20)scoreEl=el});
  if(!scoreEl)return;
  let current=0;
  const duration=1500;
  const start=Date.now();
  function tick(){
    const elapsed=Date.now()-start;
    const progress=Math.min(elapsed/duration,1);
    // Ease out cubic
    const eased=1-Math.pow(1-progress,3);
    current=Math.round(eased*target);
    scoreEl.textContent=current;
    if(progress<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  // Also reset ticker start time
  if(window._tickerState)window._tickerState.start=Date.now();
}

function saveToHistory(){
  try{
    const ov=state.results&&state.results.overall;
    if(!ov||!ov.overall_score)return;
    const history=JSON.parse(localStorage.getItem('hc_history')||'[]');
    history.push({
      score:Math.round(ov.overall_score),
      maturity:ov.maturity_label||'',
      timestamp:new Date().toISOString(),
      sections:(state.results.sections||[]).filter(s=>s.active).map(s=>({id:s.section_id,score:Math.round(s.score||0)}))
    });
    // Keep last 20 runs
    if(history.length>20)history.splice(0,history.length-20);
    localStorage.setItem('hc_history',JSON.stringify(history));
  }catch(e){}
}

function getHistoryBadge(){
  try{
    const history=JSON.parse(localStorage.getItem('hc_history')||'[]');
    if(history.length<2)return'';
    const prev=history[history.length-2];
    const curr=state.results&&state.results.overall;
    if(!curr||!curr.overall_score)return'';
    const diff=Math.round(curr.overall_score)-prev.score;
    if(diff===0)return'<span class="history-badge history-same">= same as last run</span>';
    const cls=diff>0?'history-up':'history-down';
    const arrow=diff>0?'\u2191':'\u2193';
    const ago=prev.timestamp?new Date(prev.timestamp).toLocaleDateString():'previous run';
    return'<span class="history-badge '+cls+'">'+arrow+' '+Math.abs(diff)+' pts vs '+ago+'</span>';
  }catch(e){return''}
}


function getLastRunBadge(){
  try{

function renderGaugeSVG(score,size,showLabel){
  const s=Math.max(0,Math.min(100,Math.round(score||0)));
  const sw=size>=120?6:size>=80?5:3;
  const r=(size/2)-sw-2;
  const circ=2*Math.PI*r;
  const arcLen=circ*0.75;
  const gapLen=circ*0.25;
  const filled=(s/100)*arcLen;
  const offset=arcLen-filled;
  const fs=size<55?13:size<80?18:size<110?24:34;
  const c='#FF3621';
  const numColor='#1B3139';
  const lbl=showLabel?'<text x="'+size/2+'" y="'+(size/2+fs*0.55)+'" text-anchor="middle" style="font-size:'+Math.max(9,fs*0.38)+'px;fill:'+c+';font-weight:500;font-family:Inter,sans-serif">'+scoreLabel(s)+'</text>':'';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    +'<g transform="rotate(135,'+size/2+','+size/2+')">'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#E5E7EB" stroke-width="'+sw+'" stroke-dasharray="'+arcLen+' '+gapLen+'" stroke-linecap="round"/>'
    +'<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+c+'" stroke-width="'+sw+'" stroke-dasharray="'+arcLen+' '+gapLen+'" stroke-dashoffset="'+offset+'" stroke-linecap="round" style="transition:stroke-dashoffset .8s ease"/>'
    +'</g>'
    +'<text x="'+size/2+'" y="'+(size/2-(showLabel?fs*0.12:0))+'" text-anchor="middle" dominant-baseline="central" style="font-size:'+fs+'px;font-weight:700;fill:'+numColor+';font-family:Inter,sans-serif">'+s+'</text>'
    +lbl
    +'</svg>';
}

    tkeys.forEach(k=>{

      let val='\u2014';
      if(last){
        if(last.value!=null)val=last.value.toLocaleString()+' '+t.unit;
        else if(last.p95_sec!=null)val=last.p95_sec+'s P95';
        else if(last.failure_rate!=null)val=last.failure_rate+'%';
      }
      const arrows={increasing:'\u2191 Trending up',decreasing:'\u2193 Trending down',stable:'\u2192 Stable',insufficient_data:'\u2014 Limited data'};
      const tColor=t.direction==='decreasing'?'#374151':t.direction==='increasing'?(k==='cost'||k==='job_failures'?'#6B7280':'#374151'):'#9CA3AF';

      </div>`;
    });
    h+='</div>';
  }

  /* What-if scenarios */
  const whatif=ins.whatif_scenarios||[];
  if(whatif.length>0){
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:14px">';

  /* AI Insights (collapsible) */
  if(ai.executive_summary&&!ai.error){
    h+=`<div class="card" style="overflow:hidden;margin-bottom:14px">
      <div id="aiToggle" style="padding:14px 18px;background:linear-gradient(135deg,#F5F3FF,#EEF2FF);cursor:pointer;display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px">\u2728</span>
          <span style="font-size:14px;font-weight:600;color:#4C1D95">AI-Powered Insights</span>
          <span style="font-size:11px;color:#6D28D9;background:#EDE9FE;padding:2px 8px;border-radius:10px;font-weight:500">${esc(ai.model||'GenAI')}</span>
        </div>
        <span id="aiChevron" style="color:#6D28D9;font-size:14px">\u25BC</span>
      </div>
      <div id="aiBody" style="display:none;padding:20px">
        <div style="margin-bottom:18px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">\uD83E\uDDE0 Executive Summary</div><div style="font-size:13px;line-height:1.7;color:#6B7280;white-space:pre-wrap">${esc(ai.executive_summary)}</div></div>
        ${(ai.cross_section_insights||[]).length?'<div style="margin-bottom:18px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">\u26A1 Cross-Section Correlations</div>'+(ai.cross_section_insights||[]).map(c=>`<div style="padding:8px 12px;background:#FAFAFE;border:1px solid #E9E5FF;border-radius:6px;margin-bottom:6px;font-size:12px;color:#6B7280"><span style="font-weight:600;color:#4C1D95">${esc((c.sections||[]).join(' \u2194 '))}: </span>${esc(c.insight)}</div>`).join('')+'</div>':''}
        ${(ai.action_plan||[]).length?'<div style="margin-bottom:18px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">\u27A1 Prioritized Action Plan</div>'+(ai.action_plan||[]).map((s,i)=>`<div style="display:flex;gap:10px;padding:8px 0;${i<(ai.action_plan||[]).length-1?'border-bottom:1px solid #F3F4F6':''}"><div style="width:22px;height:22px;border-radius:50%;background:#EDE9FE;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6D28D9;flex-shrink:0">${s.priority}</div><div><div style="font-size:13px;font-weight:500">${esc(s.action)}</div><div style="font-size:11px;color:#6B7280;margin-top:2px">Impact: ${esc(s.impact)} \u00B7 Effort: ${esc(s.effort)}</div></div></div>`).join('')+'</div>':''}

function renderScoreBooster(){
  const r=state.results;if(!r||!r.score_booster||!r.score_booster.available)return'';
  const sb=r.score_booster;
  if(sb.total_boost<=0)return'';
  
  // Initialize simulator state
  if(!window._simState)window._simState={};
  
  const cur=Math.round(sb.current_score);
  const allOpps=sb.all_opportunities||sb.top_opportunities||[];
  
  // Calculate simulated score based on toggled opportunities
  let simBoost=0;
  allOpps.forEach(opp=>{
    if(window._simState[opp.check_id])simBoost+=opp.projected_boost;
  });
  const simScore=Math.min(Math.round(cur+simBoost),100);
  const pot=sb.potential_score;
  const activeCount=Object.values(window._simState).filter(v=>v).length;
  
  let oppCards='';
  allOpps.slice(0,6).forEach(opp=>{
    const checked=window._simState[opp.check_id]?'checked':'';
    const rec=opp.recommendation||{};
    const docLink=rec.docs_url?`<a href="${esc(rec.docs_url)}" target="_blank" style="font-size:11px;color:#2563EB;display:inline-block">Docs \u2197</a>`:'';
    oppCards+=`<div class="card" style="padding:12px;margin-bottom:6px;border-left:3px solid ${checked?'#2D6A4F':'#E5E7EB'};transition:all .2s">
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
        <input type="checkbox" class="sim-toggle" data-cid="${esc(opp.check_id)}" ${checked} style="margin-top:2px;accent-color:#2D6A4F;width:15px;height:15px;cursor:pointer;flex-shrink:0">
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">

          <div style="font-size:11px;color:#6B7280;margin-top:3px">${esc(opp.current_value||'')}</div>
          <div style="font-size:11px;color:#9CA3AF;font-style:italic;margin-top:2px">${esc(opp.peer_benchmark||'')}</div>
          ${docLink}
        </div>
      </label>
    </div>`;
  });
  
  const moreCount=allOpps.length-6;
  const moreLink=moreCount>0?`<div style="text-align:center;margin-top:8px"><a href="#" id="viewAllAdoption" style="font-size:13px;color:#2563EB;font-weight:500">See all ${allOpps.length} opportunities \u2197</a></div>`:'';
  
  return `<div class="card" style="padding:24px;margin-top:24px;background:linear-gradient(135deg,#F8FAFC 0%,#F1F5F9 100%);border:1px solid #CBD5E1">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:16px;font-weight:700;color:#1B3139">Score Simulator</div>
        <div style="font-size:13px;color:#6B7280;margin-top:2px">${activeCount>0?'Toggle capabilities to see your projected score change':'Check the boxes below to simulate your potential score'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#374151">${cur}</div><div style="font-size:11px;color:#9CA3AF">Current</div></div>
        <div style="font-size:18px;color:#9CA3AF">\u2192</div>
        <div style="text-align:center"><div id="simScoreDisplay" style="font-size:24px;font-weight:700;color:${simBoost>0?'#2D6A4F':'#1B3139'};transition:all .3s">${simScore}</div><div style="font-size:11px;color:${simBoost>0?'#2D6A4F':'#374151'}">${simBoost>0?'Simulated':'Potential'}</div></div>

      <div style="height:8px;background:#E5E7EB;border-radius:4px;overflow:visible;position:relative">

function getSettingsUrl(checkId){
  const map={
    '4.2.1':'/sql/warehouses','4.2.2':'/compute','4.5.3':'/sql/warehouses',
    '4.1.2':'/workflows','4.5.2':'/compute',
    '5.1.1':'/settings/workspace/ip-access-lists','5.2.5':'/settings/workspace/developer',
    '5.2.6':'/settings/workspace/identity-and-access',
    '1.2.1':'/settings/workspace/predictive-optimization',
    '6.1.1':'/data-management/unity-catalog',
    '3.1.1':'/compute','3.1.2':'/compute',
    '5.3.5':'/compute',
  };
  const path=map[checkId]||'';
  if(!path)return'';
  const wsHost=window._workspaceHost||(state.results&&state.results.diagnostics&&state.results.diagnostics.workspace_host)||'';
  return wsHost?wsHost+path:path;
}
function initWorkspaceHost(){
  // Try to get workspace host from the o= param or API
  const params=new URLSearchParams(window.location.search);
  const orgId=params.get('o');
  if(orgId){
    // Standard Databricks workspace URL pattern
    fetch('/api/workspace-host').then(r=>r.json()).then(d=>{
      if(d.host)window._workspaceHost=d.host;
    }).catch(()=>{});
  }
  // Also try direct fetch
  fetch('/api/workspace-host').then(r=>r.json()).then(d=>{
    if(d.host)window._workspaceHost=d.host;
  }).catch(()=>{});
}
initWorkspaceHost();

function renderSavingsTicker(){
  const br=state.results&&state.results.burn_rate;
  if(!br||!br.available||br.total_monthly_waste<1)return'';
  
  // Initialize ticker state
  if(!window._tickerState){
    window._tickerState={start:Date.now(),toggles:{},baseRate:br.per_second};
  }
  
  // Calculate current effective rate based on toggles
  let effectiveRate=br.per_second;
  let totalSaved=0;
  (br.sources||[]).forEach(s=>{
    if(window._tickerState.toggles[s.id]){
      effectiveRate-=s.per_second;
      totalSaved+=s.monthly_waste;
    }
  });
  effectiveRate=Math.max(0,effectiveRate);
  
  // Build source toggles
  let toggles='';
  (br.sources||[]).slice(0,6).forEach(s=>{
    const checked=window._tickerState.toggles[s.id]?'checked':'';
    const saveMo=s.monthly_waste;
    toggles+=`<label style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6;cursor:pointer">
      <input type="checkbox" class="ticker-toggle" data-sid="${s.id}" ${checked} style="margin-top:2px;accent-color:#FF3621;width:16px;height:16px;cursor:pointer">
      <div style="flex:1"><div style="font-size:13px;font-weight:600;color:#1B3139">${esc(s.label)}</div>
      <div style="font-size:11px;color:#6B7280;margin-top:2px">${esc(s.description).substring(0,100)}</div></div>
      <div style="font-size:13px;font-weight:700;color:#2D6A4F;white-space:nowrap">-$${saveMo.toLocaleString(undefined,{maximumFractionDigits:0})}/mo</div>
    </label>`;
  });
  
  const pctReduced=br.total_monthly_waste>0?Math.round(totalSaved/br.total_monthly_waste*100):0;
  const remainingMonthly=Math.max(0,br.total_monthly_waste-totalSaved);
  
  return `<div class="card" style="padding:0;margin-bottom:28px;overflow:hidden;border:1px solid #E5E7EB">
    <div style="background:linear-gradient(135deg,#1B3139,#2D3F48);padding:24px 28px;color:white">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.5);margin-bottom:6px">Live Savings Opportunity</div>
          <div style="display:flex;align-items:baseline;gap:8px">
            <span id="tickerAmount" style="font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;color:#FF6B4A">$0.00</span>
            <span style="font-size:13px;color:rgba(255,255,255,0.5)">wasted since this report loaded</span>
          </div>
        </div>
        <div style="text-align:right">
          <div id="tickerRate" style="font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:${effectiveRate>0?'#FF6B4A':'#2D6A4F'}">$${effectiveRate.toFixed(4)}/sec</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px">
            $${Math.round(effectiveRate*86400).toLocaleString()}/day &middot; $${Math.round(remainingMonthly).toLocaleString()}/mo &middot; $${Math.round(remainingMonthly*12).toLocaleString()}/yr
          </div>
        </div>
      </div>
      ${pctReduced>0?`<div style="margin-top:12px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pctReduced}%;background:#2D6A4F;border-radius:2px;transition:width .5s ease"></div></div>
      <div style="font-size:11px;color:#2D6A4F;margin-top:4px;font-weight:600">${pctReduced}% of waste eliminated by selected optimizations</div>`:''}
    </div>
    <div style="padding:20px 28px;background:white">
      <div style="font-size:12px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Toggle optimizations to see the ticker slow down</div>
      ${toggles}
    </div>
  </div>`;
}

function renderDetailTable(items){
  if(!items||!items.length)return'';
  if(typeof items[0]!=='object')return'';
  const cols=Object.keys(items[0]);
  const hdr=cols.map(c=>`<th>${esc(c.replace(/_/g,' '))}</th>`).join('');
  const tbody=items.map(r=>`<tr>${cols.map(c=>{
    const v=r[c];
    const s=String(v??'');
    const display=s.length>80?s.substring(0,77)+'...':s;
    return `<td title="${esc(s)}">${esc(display)}</td>`;
  }).join('')}</tr>`).join('');
  return `<div style="max-height:350px;overflow:auto;border:1px solid #E5E7EB;border-radius:6px"><table class="detail-table"><thead><tr>${hdr}</tr></thead><tbody>${tbody}</tbody></table></div>`;
}

/* Universal detail renderer — handles ALL possible detail keys from any check */
function renderAllDetails(det, checkStatus){
  if(!det || typeof det !== 'object' || Object.keys(det).length === 0) {
    if(checkStatus === 'pass') return '<div style="margin-top:8px;padding:10px 14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:6px;font-size:12px;color:#166534"><strong><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#2D6A4F;margin-right:6px;vertical-align:middle"></span>Best practice achieved.</strong> This check meets or exceeds the target. Continue maintaining this standard.</div>';
    return '<div style="margin-top:8px;font-size:12px;color:#9CA3AF">No additional details available.</div>';
  }
  let html='';
  const summary=det.summary||'';
  if(summary) html+=`<div style="margin-top:8px;font-size:12px;color:#6B7280;font-style:italic">${esc(summary)}</div>`;

  // Render all array-type detail keys as tables
  const arrayKeys = Object.keys(det).filter(k => Array.isArray(det[k]) && det[k].length > 0 && typeof det[k][0] === 'object');
  const labelMap = {
    'non_conforming': checkStatus==='pass'?'Details':'Non-conforming resources',
    'classification_summary':'Classification Summary',
    'top_jobs':'Top Jobs','endpoints':'Endpoints','tools':'Tools',
    'external_bi_tools':'External BI Tools','databricks_native':'Databricks Native',
    'active_endpoints':'Active Endpoints','other_tools':'Other Tools',
    'trend':'Trend Data','months':'Monthly Trend'
  };

  arrayKeys.forEach(key=>{
    const items=det[key];
    const label=labelMap[key]||key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    const suffix=items.length>=20?' shown, more may exist':'';
    html+=`<div style="margin-top:10px"><div style="font-size:11px;font-weight:600;color:#6B7280;margin-bottom:4px">${label} (${items.length}${suffix})</div>${renderDetailTable(items)}</div>`;
  });

  // Render scalar/object details as key-value pairs
  const peerBenchmark=det.peer_benchmark||'';
  if(peerBenchmark) html+=`<div style="margin-top:8px;padding:10px 14px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;color:#374151"><strong>\u{1F465} Peer Insight:</strong> ${esc(peerBenchmark)}</div>`;
  const projected=det.projected_score_boost||0;
  if(projected>0) html+=`<div style="margin-top:6px;padding:8px 14px;background:#F1F5F9;border:1px solid #CBD5E1;border-radius:6px;font-size:12px;color:#1B3139"><strong>\u{1F4C8} Score Impact:</strong> Adopting this could add <strong>+${projected} points</strong> to your overall health score</div>`;
  const scalarKeys = Object.keys(det).filter(k => !Array.isArray(det[k]) && k !== 'summary' && k !== 'peer_benchmark' && k !== 'projected_score_boost' && det[k] !== null && det[k] !== undefined && typeof det[k] !== 'object');
  if(scalarKeys.length > 0 && arrayKeys.length === 0){
    const items = scalarKeys.map(k => ({metric: k.replace(/_/g,' '), value: det[k]}));
    html+=`<div style="margin-top:10px">${renderDetailTable(items)}</div>`;
  }

  if(!html) html='<div style="margin-top:8px;font-size:12px;color:#9CA3AF">No additional details available.</div>';
  return html;
}

      // Recommendation

    });
    groups+=`<div style="margin-bottom:24px"><h2 style="font-size:15px;font-weight:600;margin:0 0 10px;padding-bottom:8px;border-bottom:2px solid #E5E7EB">${esc(sub)}</h2>${rows}</div>`;
  });

// ── API ──
async function loadWarehouses(){
  const sel=document.getElementById('whSelect');
  if(!sel)return;
  sel.innerHTML='<option>Loading warehouses...</option>';
  try{
    const r=await fetch('/api/warehouses');
    const data=await r.json();
    if(data.error){
      sel.innerHTML=`<option>Error: ${esc(data.error).substring(0,80)}</option>`;
      state.error='Warehouse listing failed: '+data.error;
      render();return;
    }
    if(Array.isArray(data)&&data.length>0){
      const serverless=data.filter(w=>w.enable_serverless_compute);
      const list=serverless.length>0?serverless:data;
      sel.innerHTML=list.map(w=>`<option value="${w.id}">${esc(w.name)} (${w.cluster_size}) \u2014 ${w.enable_serverless_compute?'Serverless':w.warehouse_type} \u2014 ${w.state}</option>`).join('');
    } else {
      sel.innerHTML='<option>No warehouses available</option>';
    }
  }catch(e){
    sel.innerHTML=`<option>Error: ${esc(e.message)}</option>`;
  }
}

async function startCheck(){
  const sel=document.getElementById('whSelect');
  if(!sel||!sel.value)return;
  state.error=null;state.view='running';
  state.warehouseId=sel.value;
  state.runState={idx:0,total:9,name:'Initializing...',completed:{}};
  render();
  try{
    const res=await fetch('/api/health-check/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({warehouse_id:sel.value,include_table_analysis:true})});
    if(!res.ok){const e=await res.json();if(res.status===409){
        // Auto-reset stuck run
        await fetch('/api/health-check/reset',{method:'POST'});
        // Retry
        const res2=await fetch('/api/health-check/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({warehouse_id:sel.value,include_table_analysis:true})});
        if(!res2.ok){const e2=await res2.json();throw new Error(e2.error||'Failed after reset');}
      } else {
        throw new Error(e.error||'Failed to start');
      }}
  }catch(e){state.error=e.message;state.view='setup';render();loadWarehouses();return;}

  let sseActive=true;let es;
  function connectSSE(){
    es=new EventSource('/api/health-check/stream');
    es.onmessage=(ev)=>{
      const d=JSON.parse(ev.data);
      if(d.type==='progress'){
        state.runState.idx=d.completed||state.runState.idx;
        state.runState.total=d.total_sections||state.runState.total;
        state.runState.name=d.section_name||state.runState.name;
        render();
      } else if(d.type==='section_complete'){
        state.runState.completed[d.section]={score:d.score,active:d.active,name:d.section_name};
        state.runState.idx=d.completed||state.runState.idx;
        render();
      } else if(d.type==='complete'||d.type==='done'){
        sseActive=false;es.close();
      } else if(d.type==='error'){
        sseActive=false;es.close();
        state.error=d.message;state.view='setup';render();loadWarehouses();
      }
    };
    es.onerror=()=>{es.close();sseActive=false;};
  }
  connectSSE();

  async function pollResults(){
    const maxWait=900000;const start=Date.now();
    while(Date.now()-start<maxWait){
      await new Promise(r=>setTimeout(r,3000));
      try{
        const r=await fetch('/api/health-check/results');
        if(r.status===202){state.runState.name=state.runState.name||'Processing...';render();continue;}
        if(r.status===500){const e=await r.json();state.error=e.error||'Failed';state.view='setup';render();loadWarehouses();return;}
        if(r.ok){
          const data=await r.json();
          if(data.sections&&data.sections.length>0){
            if(es&&sseActive){es.close();}
            state.results=data;if(data.diagnostics&&data.diagnostics.workspace_host)window._workspaceHost=data.diagnostics.workspace_host;state.view='dashboard';render();return;
          }
        }
      }catch(e){}
    }
    state.error='Health check timed out.';state.view='setup';render();loadWarehouses();
  }
  pollResults();
}

render();
loadWarehouses();


// ── AI Health Advisor Chat ──────────────────────────────────────────
window._chatOpen=false;
window._chatMessages=[];
window._chatLoading=false;

function renderChatFab(){
  if(!state.results||state.view==='setup'||state.view==='running'||state.view==='wrapped')return'';
  return `<button class="chat-fab" id="chatFab" title="AI Health Advisor">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  </button>`;
}

function renderChatPanel(){
  if(!window._chatOpen)return'';
  let msgs='';
  window._chatMessages.forEach(m=>{
    if(m.role==='user'){
      msgs+=`<div class="chat-msg user">${esc(m.content)}</div>`;
    } else {
      msgs+=`<div class="chat-msg assistant">${formatMd(m.content)}</div>`;
    }
  });
  if(window._chatLoading){
    msgs+='<div class="chat-msg assistant"><div class="chat-typing"><span></span><span></span><span></span></div></div>';
  }
  const suggestions=window._chatMessages.length===0?`
    <div class="chat-suggestions">
      <button onclick="sendChat('What should I prioritize first?')">What to prioritize first?</button>
      <button onclick="sendChat('What will have the biggest score impact?')">Biggest score impact?</button>
      <button onclick="sendChat('How can I reduce costs?')">How to reduce costs?</button>
      <button onclick="sendChat('Summarize my security posture')">Security summary</button>
    </div>`:'';
  return `<div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div style="display:flex;align-items:center;gap:10px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4c0 1.1-.4 2-1 2.8L12 12l-3-3.2A4 4 0 0112 2z"/><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/></svg>
        <div>
          <div style="font-size:14px;font-weight:600">Health Advisor</div>
          <div style="font-size:11px;opacity:0.6">Powered by Databricks Foundation Models</div>
        </div>
      </div>
      <button id="chatClose" style="background:none;border:none;color:white;cursor:pointer;padding:4px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="chat-messages" id="chatMsgArea">
      ${msgs||'<div style="text-align:center;color:#9CA3AF;margin-top:40px"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5" style="margin:0 auto 12px;display:block"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><div style="font-size:14px;font-weight:500;color:#374151;margin-bottom:4px">Ask me anything</div><div style="font-size:12px">about your health check results</div></div>'}
    </div>
    ${suggestions}
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Ask about your results..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
      <button class="chat-send" id="chatSendBtn" onclick="sendChat()" ${window._chatLoading?'disabled':''}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>`;
}

function formatMd(text){
  if(!text)return'';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<div style="font-weight:600;margin:8px 0 4px">$1</div>')
    .replace(/^## (.+)$/gm,'<div style="font-weight:700;font-size:14px;margin:8px 0 4px">$1</div>')
    .replace(/^- (.+)$/gm,'<div style="padding-left:12px">• $1</div>')
    .replace(/^\d+\. (.+)$/gm,'<div style="padding-left:12px">$&</div>')
    .replace(/\n/g,'<br>');
}

async function sendChat(text){
  const input=document.getElementById('chatInput');
  const msg=text||input?.value?.trim();
  if(!msg||window._chatLoading)return;
  if(input)input.value='';

  window._chatMessages.push({role:'user',content:msg});
  window._chatLoading=true;
  refreshChat();

  try{
    const ctx=state.results?{overall:state.results.overall,sections:(state.results.sections||[]).map(s=>({section_name:s.section_name,section_id:s.section_id,score:s.score,active:s.active,checks:(s.checks||[]).filter(c=>c.status==='fail'||c.status==='partial').slice(0,5).map(c=>({name:c.name,status:c.status,current_value:c.current_value,benchmark:c.benchmark,recommendation:c.recommendation}))})),burn_rate:state.results.burn_rate,top_recommendations:(state.results.top_recommendations||[]).slice(0,8)}:null;
    const resp=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:window._chatMessages,context:ctx,warehouse_id:state.warehouseId||''})
    });
    if(!resp.ok){const t=await resp.text();throw new Error('HTTP '+resp.status+': '+t.substring(0,150));}
    const data=await resp.json();
    window._chatMessages.push({role:'assistant',content:data.answer||data.error||'No response.'});
  }catch(e){
    window._chatMessages.push({role:'assistant',content:'Connection error: '+(e.message||'unknown')+'. Check console.'});console.error('Chat error:',e);
  }
  window._chatLoading=false;
  refreshChat();
}

function refreshChat(){
  const panel=document.getElementById('chatPanel');
  const fab=document.getElementById('chatFab');
  if(window._chatOpen){
    if(fab)fab.style.display='none';
    const container=panel?.parentElement||document.body;
    const existing=document.querySelector('.chat-panel');
    if(existing)existing.outerHTML=renderChatPanel();
    else{const d=document.createElement('div');d.innerHTML=renderChatPanel();document.body.appendChild(d.firstElementChild);}
    // Scroll to bottom
    setTimeout(()=>{const ma=document.getElementById('chatMsgArea');if(ma)ma.scrollTop=ma.scrollHeight;},50);
    // Bind close
    const cb=document.getElementById('chatClose');
    if(cb)cb.onclick=()=>{window._chatOpen=false;refreshChat();};
  } else {
    const p=document.querySelector('.chat-panel');if(p)p.remove();
    if(fab)fab.style.display='flex';
  }
}
